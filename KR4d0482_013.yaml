body:
  text: 艮齊詩集卷十三元侯克中撰别金臺諸友蟋蟀悲吟動客愁書來催我復南州不才每荷親朋愛多病難堪父母憂冉冉碧雲燕塞晚嗷嗷白鴈楚天秋霜風不卷殘荷盡留與行人泛柏舟汴梁即事暮史朝經豈有程陽春白雪古難能好山自許幽人住明鏡何妨醜婦憎大野縱騰千里火小齊嚴禁一龕燈清涇濁渭誰分别浩浩黃流問不譍牢落牢落天涯鬢已􅁝亡羊岐路定何之平生泉石空成癖滿腹詩書不療飢塵世虛名千古重草堂真樂幾人知鵾鵬九萬扶搖逺應笑鷦鷯老一枝秋旱塵滿麻袍雪滿髯風吹病骨怯秋嚴穀苗不雨飢將至梨葉經霜色重添牛喘一時懷丙吉菊荒三徑憶陶􅇓日髙衙散蜂兒閙採遍寒花意未厭秋霽雨沐秋容絶㸃埃一杯誰與共荒臺仰看白鴈銜書過坐待青蚨致酒來髙栁四圍雲幕展好山千里畫屏開衡門盡日無人到黃雀從容啄緑苔客中有感北州才子又南州風裏孤蓬不自由楊子江頭秋渡馬洞庭湖上夜行舟松楸未卜容癡坐藜藿雖貧敢妄求可是謀生太迂闊一身長使衆人憂西郊散步杖策行吟不憚勞西園佳趣勝東郊人貧反比蝸無舍鳩拙猶知鵲有巢酒後逢花從去住枕中得句自推敲幾時獨對庭邊竹細聽春風碧玉梢秋樓遣興久客天涯興自䦨可堪蹤跡寄臨安一天海氣侵肌冷八月江潮破膽寒僻地幾時曽啓戶小樓終日厭憑䦨巨魚己落任公手誰為纖鱗下釣竿久客十年蹤跡逐浮萍四海交游隕曙星白璧自為希世寶黃庭誰作換鵝經鏡中鬢影莖莖白樓外山光處處青久客天涯歸未得杜鵑哀怨不堪聽晚春正喜羣芳壓樹稠忽驚紅紫一時休老來詩筆如神助春去花枝似鬼偷千尺游􅁝縈暮景一巵芳酒浣離憂杜鵑聲裏東風惡滿地楊花㸃㸃愁自警秦霸虞亡百里奚可能只博五羊皮楚人抱玉悲三獻漢守辭金畏四知病後等閒為酒困老來依舊坐書癡米如珠玉薪如桂猶欲兒孫食肉糜戲題嵗月空催白髮新詩書只博老來貧一杯竹葉茅亭晚三弄梅花紙帳春病怯朔風穿戶急愁聞飛雪打窗頻萍虀豆粥晨飱了笑殺風流石季倫公子行畫㦸朱門樂事多春風池館水明波兒嬉輕碎玉如意客散不收金叵羅盡日優伶餘酒肉通宵鄰里厭笙歌憑誰細問青雲客奈此人間凍餒何感舊穠李天桃次第新牡丹留得殿餘春石崇禍起珊瑚樹馬援疑生薏苡仁今見槖駝來海角昔聞杜宇叫天津相逢不􅂸西湖醉白首能存幾故人和柯以善閒居感事詩韻月入星河北斗寒聖賢際㑹古來難萬鍾不受齊宣祿五斗何勞靖節官麟鳳自應逃禁網貂蟬未必到儒冠一尊細讀離騷罷慷慨令人憶幼安夜坐憔悴梁鴻久賃舂漢家何事不相容壯懷老去如灰冷歸興年來似酒濃千載風雲從鄧禹一時湖海自元龍漫漫長夜無人語挑盡寒燈聽曉鐘感時百年日日是芳辰草木乘時次第新燕子不知江上晚牡丹先占洛中春南荒莫道多蛇虺中國都能幾鳳麟流水桃花千載後更誰曽見武陵人自笑論史談經夜不眠歸期未遂買山錢紅塵有恨江湖異白髮無情嵗月遷曉夢池塘春草地凍吟風雪早梅天青蠅鑽紙成何事一笑蘇杭十二年老懷白髮書生老更慵北窗髙枕自從容不憂米勝珍珠貴且喜杯深琥珀濃栁絮飛殘方芍藥菊花開盡又芙蓉爭如空谷風烟好千仞懸崖百丈松自適布衾如鐵簟如氷多病筋骸老不勝故國關河秋過鴈破窗風雨夜挑燈託身人海知今是掉臂王門記昔曽斥鷃藩籬聊自適扶搖九萬任鵾鵬羇懷嵗晚羇懷萃百憂飄蕭蓬鬢朁花羞琴書有分追陪老風雨無情斷送秋賔鴈夜投江外浦旅人寒倚水西樓關心多少天涯恨醉入無何事事休中秋晚霽秋空黯黯障陰霾老子南樓事不諧霜氣隨風清海宇月明如水浸天街儘傾旨酒酬佳興莫把新詩惱壯懷試向姮娥問消息幾時歸棹過江淮秋思塵滿虛齊草滿庭研如廢沼筆如僧詩魂夜繞金莖露酒病時呼玉井氷簾幕蕭條悲社燕杯盤狼藉厭秋蠅陶然醉倒無人喚睡起東窗日己升錢唐即事白髮蕭蕭滿鏡中客懷寥寞燕巢空鴈投絶域書難託虎迫嚴城路不通二尺短檠挑夜雨一聲長笛怨秋風西湖流盡繁華夢忍聽江潮打廢宫閒居懷友僻巷柴門夜不關一簮華髮照衰顔鑿開蒼蘚通流水捲盡珠簾得好山三徑儘容歸去樂萬金難買老來閒故人别後知何處應在神嵩泰華間漫賦澤畔青蕪沒紫蘭鏡中白髮代朱顔六龍矯矯當天運九虎耽耽守帝關江月自圓仍自缺野雲飛去又飛還爭如醉跨黃牛背一笛天風滿意山過友生新居靜看飛雲自往還了如名利不相關庭中緑樹窗前竹門外滄波屋上山林鳥不驚行客少沙鷗常羡主人閒西湖風月無邊景都在詩翁杖屨間夜坐花滿銅瓶酒滿尊旅懷寥寞過黃昏一樓明月開天宇半夜驚潮出海門蝴蝶自疑莊叟夢杜鵑誰信蜀王魂人間多少傷心事殘燭無聲㵼淚痕惜春二首青帝行權萬物春草芳木秀一番新人人儘欲趍時貴燕燕何曽厭主貧小筍㑹看凌月露好花可惜委風塵韶華豈欲輕歸去杜宇聲中字字真睡起春寒酒力微杖藜徐步欵柴扉好風有意頻吹面細雨無聲暗溼衣興似日長詩筆健歡隨春盡酒帘稀東君與我同為客何事年年獨自歸感春岸花汀草不知名野杏山桃結成春去湖山應有恨夜來風雨太無情酒家慣聽提壺語田舍初聞布榖聲欲向東君問消息夕陽無語下西城晚春述事滿面塵埃兩鬢霜不堪萍梗寄錢唐雷霆勢迫春潮怒風雨聲連晝漏長旅舍經年人事少市河終日客舟忙書窗未省韶華老俄聽樓前賣海棠用前韵旅食江南十二霜市樓寥莫對橫塘賣花聲少韶華暮垂栁陰多化日長燕子營巢徒自苦蜂兒釀蜜為誰忙東風吹遍無名草那惜餘春到野棠僻性僻性常思拜杏壇病軀不識夢長安獨清有鬢嗟霜白尺素無材寫寸丹長塞霜風秋爛熳短檠燈火夜䦨珊時人只說梅花好誰為蒼松話嵗寒自適睡起移牀趂緑陰異鄉風物動長吟松筠老負凌雲􅋵葵藿生含向日心千里好山招我隱一巵芳酒約誰斟妻孥莫厭家貧甚滿腹詩書抵萬金感春過隙光陰逐水流惱人風物更堪愁冥濛小雨寒無賴狼藉落花春不收莫用新詩追暮景且斟濁酒浣離憂恍然三月清明過一片繁華夢裏休登臨長日虛齊厭苦吟偶扶藜杖獨登臨無窮宇宙千年事有限形骸一寸心水外輕鷗青漲逺雲間幽鳥翠微深旅人不似歸鴉好夜夜相呼返故林山居竹滿空庭草滿階山居殊不費安排紅薑紫蟹撩清興白酒黃雞愜素懷華嶽豈能留若水錦城只合著乖崖野夫僻性無他好飽誦羲經老艮齊即事短髮刁蕭滿鏡􅁝河梁􅂝手暮何之共誇鮑叔分財日獨念延陵掛劒時金馬未投鸚鵡賦玉人休唱鷓鴣詞曉來欲問東君信春到梅花第幾枝立春後書懷昨夜東風底處過栁條依舊得春多百年湖海閒中老萬里乾坤醉後歌雲盡好山青似染雨餘新水净無波從知無忌凌烟閣不及堯夫安樂窩登樓有感造物冥冥若有知夔蚿隨分動天機百年傳舍隨流水幾度憑䦨送落暉秋色暗從孤鳥沒晚霞偶趂斷鴻飛古今得失原如此莫與莊生較是非懷古莫謂龍韜勝犬韜恐因一割廢鉛刀渡河有筆書三豕跨海無人斬六鼇齊士但能知管晏沛公不過用蕭曹自從老却元龍後誰卧曽樓百尺髙錢唐客懷亡羊岐路足風沙白首飄零未到家子美有詩哀杜宇樂天無淚聽琵琶江紅方緑閩中果魏紫姚黃洛汭花一片錢唐佳麗地不應自我作天涯自釋二首天涯嵗月厭飄零畫虎屠龍兩不成梅雨關心吟思苦竹風吹面醉魂清誰家楊栁黃鸝囀何日梧桐彩鳳鳴羌管一聲樓外起旅人懷抱若為平鑽紙癡蠅每自慙緑蓑定不換青衫頭雖似雪身猶健心未成灰口已緘五栁永懷陶令趣二桃輕信晏嬰讒長竿犢鼻譏當世千載令人愛阿咸艮齊詩集卷十三
