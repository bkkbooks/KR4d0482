body:
  text: 艮齋詩集卷十元侯克中撰讀東坡楞嚴四相說四首隂陽消息若循環動靜無端在兩間人物自生還自化了如天地不相闗因中得果果生因朝菌何修至大椿形氣自分多品類枉將因果誑時人乾坤父母大筌蹄萬類雖殊亦可推物自氣偏人自正化工雖巧不能移乾坤易簡豈難知化育流行無了期不去不來生滅斷乾乾不息欲何為致中和不偏不倚是為中無盭無乖上下通莫怪對時能育物聖人元與昊天同大哉聖人之道洋洋乎發育萬物天地無私品物亨聖入無妄自誠明此心既與乾坤一萬物何憂不發生克己復禮嗜慾紛紜塞四端私心克盡道心安渾然一理涵生意天下歸仁是不難萬物皆備於我五色昭昭寓目明鼻香口味耳收聲紛紛衆理心全了一已能兼萬物情三才乾元資始賴坤成民得中和二五精天地若無人輔相世間萬物恐虛生讀反離騷有感言出於心見所操𤣥謿未解反離騷一從草出揚雄賦澤畔靈均賈轉髙題三睡圖野僧逃跡迹還多枕虎機闗嚇老婆可笑丹青太生事又從筆底起風波題穆王八駿圖八駿驍騰氣象豪穆王乗此亦徒勞當時剰有賢肱股可惜無人說旅獒題松風醉歸圖醉夢悠悠入杳㝠寒驢踏破亂山青一壺濁酒能多少萬壑松聲喚不醒題明皇吹簫圖治音和樂亂音乖天寶新聲怨且哀獸舞鳯儀都不見喚將野鹿入宫來題桃源圖三首流水桃花出武陵小舟分破亂山青秦人莫訝當時事晉惠宫中醉不醒四靣青山兩岸花避秦世世業農家漁郎囬棹無多嘱莫作神仙到處誇四海人心苦厭秦桃源風景佀堯民融融洩洩山中樂說與龍眠畫不真題江㠶掛月圖山倚晴空水拍江一帆秋影月微茫慿誰細向舟人問險處爭先有底忙題黠鼠圖子産生魚事可傷坡仙死䑕出空囊千年二老還相見握手臨風笑一場題家景圖青襟兒女白頭親和氣溶溶四坐春塵土滿衣名利客可能不愧畫中人題蕭茂先松下幽人圖三首石上幽人意趣髙古松千尺撼風濤手中書卷還知否不是羲經定楚騷詩酒閒身與世疎老來拂袖趂幽居黃塵滿眼誰知已千尺髯龍一卷書世路﨑嶇蜀道難歸來松下獨盤桓平生只有耽書癖近日和書也不㸔題鷺鴈圖二首鷺鷥無意慕𡨕鴻飲啄閒忙况不同偶爾飛來沙上聚阿誰寫入畫圖中沙頭飢鷺厭風波塞外征鴻避網羅忙亦艱辛閒亦苦一篇山水竟如何題無心畫山水圖白石蒼藤枕碧流風濤洶湧㺯扁舟可人一寸無心筆寫出江山萬里秋題脩端卿卷後牕外脩篁案上書風流未必古人如老來更覺閒為貴坐㸔門前幾覆車題楊少監畫卷二首風流江左管夷吾黃鉞旌旄照簡書畫裏徒行縁底事更忙須駕短轅車右王導佚㳺圖中年長苦别離多絲竹聲酣擁翠蛾此樂就令兒輩覺東山不起奈卿何右謝安東山圖題莘樂亭伊尹當年樂有莘終將斯道覺斯民慿誰試問亭中客天下曽無失所人冬夜瓦鼎香銷燭影孤北風如箭雪模糊擁衾獨坐寒牕下閒聴瓶笙轉地爐促織徹夜悲吟曉不停宛如楚客哭秦庭從來忠告誰相信叫盡西風未必聴橙壓樹金橙百步香肉酸實苦不堪嘗論人必以心為主笑貌聲音恐色莊蘭空谷無人只自香澹然渾與世相忘春來多少閒蜂蝶總為山桃野杏忙木香玊蕾氷蕤壓架稠日長香徹小紅樓此時風味無人識花外一聲黃栗留十月賣菊過却重陽一月期園夫可是不知時賞音只有陶彭澤事徃人非賣與誰自况閒是閒非不欲聞獨憐野鶴在雞羣西風何日髙飛去萬里青天一片雲汴梁郊行大梁城下草連雲千古河山對夕曛一掬賈生憂國淚西風吹上信陵墳暑中有感二首竹床藤枕葛衣單滿扇清風汗不乾誰念耘苗田父苦日斜枵腹望晨飡地皮如火水如湯麥罷田夫揷晚秧十月北風農事隙借船輸入富家倉贈相士周可山人間久矣厭風波林下終為畏網羅行止未能區處得可山將謂可如何夏日偶成晝苦青蠅夜苦蚊乾坤無地著閒身市㕓莫道山林好豺虎從横更駭人感事夭桃囬首笑寒梅却被梨花冷眼窺畢竟春光誰是主洛人不厭牡丹遲題柯以善所藏瘦馬圖龍眠老筆少陵唫詞意雍容怨愈深不棄敝帷埋駿骨主人應媿古人心題李公略所藏髙彦敬夜山圖卷幽人清夜思髙閒誤落龍眠筆硯間萬仞峰巒千里月廣寒宮裏㸔三山題陳月觀所藏青紙梅花圖二首曾向羅浮見此花一枝寫出舊烟霞小牕喚起師雄夢瘦影亭亭立碧紗毫端妙理丹青外林下幽情紫翠間宴罷瑶池王母醉羣仙和月到孤山秋夜風露涓涓夜氣清數竿脩竹動秋聲破牕不禁西廊月來向幽人枕上明楊招討送乳香胡椒荅以木瓜煎戱贈薰陸番椒各有差海南方物到貧家自慚不及前人德投我瓊琚報木𤓰謾賦長門一賦萬黃金寫盡深宫怨女心莫怪長卿知底蘊茂陵曽見白頭唫臨安夏日簫鼓聲中日正長繁華依舊属錢唐晚來簾幙薰風細十里天街茉莉香題髙彦敬越山春曉圖滿目烟嵐滿意春江山如畫畫如真巖巖萬壑千峰秀可惜中間無一人春曉枕上徘徊聴曉鴉東風吹雨濕牕紗園夫不管春光老賣盡梅花賣杏花西湖晚興瀟灑梅花水外村嵗寒誰與共黄昏東風未到西湖路雪滿孤山月一痕酒醒即事滿城桃李閙青紅都在詩人醉夢中醒後不知春幾許賣花聲裏問東風旅懐緑隂滿地落紅稀逰子天涯久未歸獨倚闌干正惆悵誰家燕子雨中飛倚樓梨花散雪栁成隂中有嬌鸎弄好音說盡春來無限事東風吹入倚樓吟晚晴春蠶夏麥雨聲中水漲溪橋路不通風轉忽吹雲散盡樹梢一㸃夕陽紅客舍杜宇聲中栁絮飛黃昏燈火思依依自憐久被闗山隔常捲朱簾待燕歸荷花緑隂庭院雨初收六月荷花爛漫秋一片錦雲香不斷薰風吹入夕陽樓觀物芭蕉才展笑丁香楊栁將眠妬海棠争似梧桐飛一葉便教酷暑作新凉贈相士陳梅坡梅花坡上一枝新忙殺前村踏雪人欲向逋仙問消息乾坤畢竟幾時春艮齋詩集卷十
