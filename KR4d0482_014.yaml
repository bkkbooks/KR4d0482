body:
  text: 艮齋詩集卷十四元侯克中撰掩扃盡日無人晝掩扃靜中窺見古人情誰憐元亮生衰世我喜堯夫老太平儘向詩書窮至理肻隨蠻觸較虛名夀陵未得邯鄲術匍匐歸來失故行歸興暮史朝經似蜜甜春蠶夏麥樂無厭一之為甚其能再二者何由可得兼鴈附好音來逺塞鵲銜新喜下重簷定知歸計明年了莫向蓍龜問象占謾賦造物權衡果在誰區區生我欲何為飄零蹤迹渾無定懶散形骸百不宜絶世孤髙吾豈敢隨時俯仰自相欺丹心一寸恆多苦説與妻孥未必知病後門外黃塵十丈深鏡中白髮不勝簪皇天生我本無意造物戲人如有心日月晦明朝又暮聖賢憂患古猶今年來事事消磨盡只有琴書是賞音清貧清貧濁富迥難同食蓼蟲慚食蜜蜂米似明珠薪似桂車如流水馬如龍榮公有道稱三樂孟氏知幾鄙萬鍾歸計未能吾老矣幾時髙卧白雲峰春前一日嵗月催人不易禁一陽來復又成臨旋篘緑酒浮新蟻細擘黃橙破軟金臘雪逡巡呈美瑞春風咫尺入長吟東君己得梅花信莫向泥牛問好音夏日即事窗外青蠅止棘榛枕中白蟻閙槐根我知道可忘人勢誰謂吾能大子門秋露滴殘齊女怨春風吹斷蜀王魂野夫心地渾無事千首新詩酒一尊感時憔悴青衫陌上塵飄蕭白髮鏡中新石崇未保終身富原憲何妨徹骨貧夜永鴟梟惟恐晝嵗寒松柏不知春施施東郭墦間客醉飽歸來笑罵人僧舍即席賡冦都運詩韻拍天洋海泛枯槎􅐈地狂風掃落花林外好山藏古寺世間光景屬豪家乾坤浩蕩時難得嵗月蹉跎鬢易華日月穿墉又穿屋不知誰謂鼠無牙過仙林寺感事鸚鵡能言不出籠弋人無意慕冥鴻六經已自分邪正三語何須較異同必若彘身加爼上何如龜尾曵塗中一枝蒼竹一壺酒乘月空山訪醉翁即事瑟奏逰魚聽瓠巴妖狐未易誑張華獨憐糞壤埋芝草誰把瓊琚報木瓜蟻子片時成數陳蜂兒一日閙三衙秋江莫道芙蓉老自有寒梅次第花辭墳父母劬勞生此身昊天罔極報深恩既無聞望光宗祖又闕詩書教子孫寒骨移時成袝葬病軀甘分老衡門一杯清酌千行淚落日荒煙野樹昏兀坐懶散形骸與世疏孑然兀坐一何孤與為莊叟樊中雉寧作周公屋上烏花映尊罍傾北海雨侵蓑笠釣西湖良田數頃書千册只此傳家是永圖立春自況以艮名齋了此身年年送丑復迎寅時行時止雖由命成始成終恐在人花栁儘呈新態度松筠不改舊精神曉來便覺東風好天地氤氲萬物春十年十年蹤迹寄江湖滿篋黃金取次無病後不堪衰鬢短貧來何止故人疏誰言養女當如鼠自笑生男不及烏阿濬頗能知我意夜窗猶不廢詩書阿濬生朝三人行處有餘師善者從之惡改之為矢為函分路處學詩學禮過庭時蒼松澗底徒千尺丹桂雲中看一枝尺璧兼金無足貴人生當作克家兒潭州病後登天慶觀閣性野猖狂自不羣強隨行客犯紅塵登樓有賦哀王粲投閣無由問子雲睡少那堪茶作祟愁來唯覺酒能神到家了却松楸計何處山田不可耘悼女代母齊家惠愛深天涯永訣淚盈襟半窗春雨三更夢一寸寒燈萬里心塵世情緣渠易舍蓬萊仙闕我難尋江流有限哀無極多病形骸老不禁杭州火後連雨二首火熾無情欲燎原雨淫不己定傷田祈􅅠自足禳回祿錬石誰能補漏天逰子但憂焚旅次飢民未敢卜豐年野夫嗟怨成何事自有人司造化權正念誰能逐畢方又從何處問商羊坎離自昔曽無敘禹益于今更有光市井等間成瓦礫田疇瞬息決隄防古今氣運元如此水及神堯旱及湯自責多病筋骸老更慵栁花又復逐萍蹤康強吕望猶能釣憔悴梁鴻不任舂出否我知顛趾利養身誰信朵頥凶徒言納納乾坤大一箇微軀無地容哭弟難弟難兄慣忍貧豈期中道不為鄰勉求糲食供諸子強著歡顔慰老親十載簿書成底事一家奉養屬何人西窗燈火如年夜杜宇聲中哭莫春義分好山如黛水如藍白首飄零亦自慙美玉可沽何敢吝兼金無處若為貪故人已死仍留劍知已求伸遽解􅆖若水一生二字了麻衣眼孔勝圖南丁祭凜然遺像見丹青仿佛當年鯉過庭狂士尚能歌鳳德亂臣敢不懼麟經綱常炳炳垂千古香火區區拜二丁黍稷棗修猶未具忍言明德有餘馨和龔翠巖懷古韻禹範箕疇出洛龜發揮己往鑒將來楊朱路錯徒能哭夫子墻髙豈易窺劫火不燒三聖易國風難和二南詩太阿斬馬如芟草未信張華肯倒持懷古六首磨不能磷涅不緇心如灰冷鬢如􅁝申商徒取千年誚夷惠真成百世師書契未興先有易春秋方作已無詩斯文一脈誰能繼澤畔靈均賦楚詞聖賢垂訓貴知幾末世縱橫好用竒即墨三年憐樂毅商於六里笑張儀善無良報終為美惡有餘殃預可期禍福感通如影響巧言令色欲誰欺腹隱嘉謀智若愚櫝藏美玉有如無漢家廢立咨元士唐室安危繫老奴出弔不妨辭以疾瞰亡豈料遇諸塗頭顱如許將焉用誰為騷人乞鑑湖冷暖人情自古今白衣蒼狗幾浮沉夕陽亭小謀非淺偃月堂髙禍更深流水有源終入海間雲到底不成霖書生本是山中物何事人間強苦心昌黎表奏竄潮陽太白詩成逐夜郎家欲興隆生俊秀國將顛覆廢忠良靈龜有用留枯骨黠鼠無知飽太倉若使屈平知此理離騷定不怨懷襄吕秦焚典復坑儒海內惟存煨燼餘蕭相僅能收版籍漢皇初不重詩書隨時損益名雖異終古綱常道不虛萬世鮑魚遺臭在至今人唾祖龍車追和劉夢吉韻八首訪西山道院芙蓉城闕五雲深亂石飛泉潄玉音濁酒每因清興酌新詩多為故人吟青鸞已報三山信白鴈空傳萬里心殘日未傾歸去好病軀常苦暮寒侵樂道樂道安貧是本情好官況不到儒生鶴憂斷脛鳬憂續木貴非材鴈貴鳴白璧一雙憐項羽黃金四萬笑陳平賞音只許陶彭澤誰信無絃是有聲老病槐蟻紛爭睡正酣轉頭衰朽嘆吳蠶縱橫籌策非無用老病筋骸自不堪珠桂蕭條留浙右金蘭凋喪憶湖南間雲本是無心出又逐歸鴉入暮嵐晚興林外孤岑倚暮煙江頭羈旅問歸船丹心有素人誰信白首無成我自憐笑舉匏尊邀月飲醉和紙被裹雲眠幾時拂袖三峯上玉井間看十丈蓮即事道何疏逺利何親學貴精詳行貴淳南國自添新白髮東華誰羡軟紅塵楚狂有底徒歌鳳伯樂無端不相人説與邯鄲貪睡客夢中花栁總非春山居怪石巉巖老樹蒼斷雲􅂝雨送新涼四山樗櫟供樵斧萬頃煙霞護草堂鑿地種蓮收水利引泉澆藥破天荒人間謾説無梁棟澗底青松百丈長甘間聖學淵源未易能動憐髙鳥靜憐僧一樓風月三杯酒萬卷詩書半夜燈修己安人君有得存心養性我何曽客來每問紅塵事笑據胡牀竟不譍歸思猛虎耽耽卧九關此身只合老田間深憐徐福遊滄海頗恨希夷出華山素髮一簪黃卷樂青天萬古白雲間桑榆未遂歸休計慚愧投林倦鳥還中秋懷友酒聖詩豪老不任九霄風露滌煩襟寒生庭户秋方半春入尊罍夜己􅀷萬里清光千古色一簪素髮百年心故園今夕知誰健擬向姮娥問好音艮齋詩集卷十四
