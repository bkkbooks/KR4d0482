body:
  text: 艮齋詩集卷六元侯克中撰挽史丞相開府早驅貔虎定封疆晚握樞機坐廟堂名重一時羊叔子功髙千古郭汾陽歷朝事業麒麟畫遺表精誠日月光義膽忠魂何處見太行山色鬱蒼蒼挽姚左轄雪齋深探理窟得心傳洞徹先天與後天事去一身還太極物來終日體純乾流行坎止道常在玉潤蘭馨理不偏千載斯文一抔土詩成不覺泪澘然哭崔左丞髙節雄才􅗥出羣濁涇清渭古難分十年當路多知己四海無人敢哭君天水有孚成雨露電雷未合失風雲傷心最是南歸鴈嗚咽哀音不忍聞挽廉平章烈似秋霜暖似春明於皎日正於神千年海嶽英靈氣一代乾坤柱石臣賓客填門惟慕德詩書滿架不知貧致君堯舜平生事天命胡為只五旬挽張國寶總管忠義留侯素病多此心未了鬢先皤逆流洪水潛歸海方命飢民許渡河善政有為無日矣哲人不永奈時何感君傾蓋渾如舊重把新詩忍泪歌挽義士王千户億萬生靈沸鼎中當時爭敢衒英雄天樞自合長居北螮蝀誰教不在東袖裏有權除大惡筆頭無力寫竒功九原若見諸軻輩應愧斯人死至公夜宿朝元宫贈倫講師布衣久客厭塵腥邂逅逢君眼倍青帶酒有時歌白雪對花終日讀黃庭深深竹院春長好寂寂蓬門夜不扃吟嘯等間天又曉滿窗風露一壇星和雷苦齋按察韻邂逅天涯若有期緼袍初不羡輕肥幾年浪逐人南走指日還同鴈北飛涉世已知前日錯讀書方見後人非窮途莫道無知已魯語羲經儘可依挽李子陽詩酒平生不解愁鮮然天地一虛舟髙情肯羡黃金印巨筆應書白玉樓太華昔年留杖屨北邙何日著松楸謫仙人物今安在不覺臨風涕泗流和苦齋雷按察韻一行能令百行虧人心恆與道心違鶴鳬斷續空長短鵬鷃逍遙果是非灞水謾勞捫蝨手桐江誰問釣魚磯五湖莫道風波惡中有沙鷗自在飛答朱鶴皋惠茶日髙夢破打門聲陽羡新茶稱客情方念鴈無千里信忽聞鶴在九皋鳴軒轅石鼎春雲暖漢武金盤曉露清方丈蓬萊在何處乘風好締玉川盟弔李安常縣令少學軒岐慣討論晚宗孔孟盛推尊一官自足武陵尹千里誰招建業魂衣鉢已能光祖考箕裘未必到兒孫斜陽老樹荒煙外隃想孤墳酹一尊馮生名德秀字茂叔犯二賢名字令改之請詩有作夫子常嚴器與名豈容辭邑請繁纓當時尚許從先進末世徒知畏後生衍義六經相表裏通書千古放光明西山名諱濂溪字於汝安時且莫更次李御史韻傍壘新雛翅未騰扶搖寥廓果誰能獨憐南渡耽書客絶勝西來面壁僧衰鬢不堪臨曉鏡畏塗何苦履春氷蟠胸萬卷從兹始纍土終當到九層與諸相宴西湖湖上風煙百態新天涯客子獨傷神山禽水鳥尋常樂岸草汀花頃刻春好景每傷詩筆鈍芳辰莫厭酒杯頻殷勤細問孤山老幾度樓臺換主人姚翰林端甫過姑蘇訪豫出馮提刑壽卿所寄詩中間言及太常博士李鵬舉時鵬舉已不祿而壽卿間居襄陽尚未知因賡其韻以寄挈家髙隱鹿門公莫逆何嘗有異同鴻鵠林深全晚節蓴鱸江冷正秋風五千道德言猶在九萬扶搖夢已空我不忘君君念我莫分漢上與吳中題鄧山房卷後竹映軒窗水映門書為朋友道為鄰磨開萬古虛空鏡照破三生幻化身壺裏有方留白日世間無路避紅塵功成莫跨蒼鸞去常與山房作主人用前韻成性存存道義門西鄰禴祭勝東鄰逍遙逰外無窮景安樂窩中自在身我愛原思辭廩粟誰知潘嶽拜車塵飄零海角天涯客慚愧山間林下人程運副子充席間賦龎眉野老鬢如霜邂逅逢君引興長千里暮山開晚霽一籬寒菊破秋香從教好景撩詩思已判間身入醉鄉滿坐親朋皆故里恍疑魂夢到河陽和王宣慰韻生平只被古書埋胸次殊無半點埃大義不愆容我拙老懷何惜向君開一時競造平原館千載誰登樂毅臺飯飽閉簾便午枕打門誰又送詩來口占賡徐容齋韻彈指聲中得幾何頭顱如許惜蹉跎兼金敢不明辭受璞玉無勞教琢磨海內每傷佳士少天涯豈厭故人多歸來擬向滄浪上獨棹輕舟漾素波汴梁朝元宫徐真人慶八十索賦方瞳鶴髮地行仙四海朝元一洞天壽去期頤無逺日經分道德有餘年老仍掃地神公異遠涉流沙令祖賢況繼磐山三世業得無師授與家傳王同知直卿父母均年八十五輒解印養親李提舉壽卿索賦德形於外本於中解印歸來道更崇一行二三千載少雙親八十五年同至誠水火猶能蹈大孝神明豈不通安得人人皆盡分翕然四海一春風懷友時往時來莫厭頻何妨尊酒細論文鏡中白髮留春雪樓外青山隔暮雲碌碌無成空歎我區區相愛敢忘君生平只欠親朋債富貴功名百不聞悼闞彥舉錦繡肝腸鐵石姿九州行遍復何之鼇吞鯨吸千杯酒鳯起蛟騰七字詩竹杖打門求友日紙衣裹骨到家時生前死後俱漂泊想像臨風酹一巵贈段無心處士靈臺皎皎月輪孤勘破先天事事無爭向閙中呈伎倆肯從生處下工夫一壺天地供詩筆萬里江山入畫圖方念玄關何處問忽驚紫氣過三吳題柯以善所藏合江圖卷晴波渺渺去無聲桂棹蘭槳夜不停二水合為千頃碧一溪分破兩山青仙家此地留丹竈帝座當年應客星不與主人同一醉春風虛負合江亭同王廉訪諸公養樂園宴竹繞軒窗花滿庭蕙薰蘭炙有餘馨錦囊佳句間中得金縷新聲醉後聽春水渡頭雙鷺白夕陽樓外亂山青聨鑣不覺歸來晚拂面東風酒未醒題賈參政雙桂堂卷栁營蘭省一生忙心已成灰鬢已霜天上力辭三事貴月中連得兩枝香邀賓握槊情雖篤教子明經味更長萬卷傳家餘慶在桂堂應不愧槐堂同史右丞遊白石洞天留别杜南谷軋軋肩輿入薜蘿琳宫夜飲發天和東山絲竹歡聲遠南谷風煙爽氣多洞裏好花濃似染世間幻景疾如梭新詩莫道渾無用留與幽人叩角歌寄友生廉訪專事威儀失太嚴少虧禮節又傷廉未酬柏府埋輪志徒起瓜田納履嫌古冶竟為齊相沮穆生幾被楚人鉗黃鍾瓦缶無分别龜䇿徒勞鄭尹占賈參政席間賦詩酒蹉跎老病身杖藜猶未出紅塵日升暘谷乾坤曉雪盡隂山草木春海上慣為千里客世間希見百年人相逢幸喜渾無事滿酌金罍莫厭頻題祁真人畫像卷長眉疏秀映方瞳野鶴昂藏對古松圯上既傳黃石略山中還啓白雲封善人涉世恆多故猛虎當途不少容紫氣入關千載後乾坤能得幾猶龍題髙同知放奴詩卷髙君決意放奴時一寸丹心肯自欺但見家僮哀有母忍令老嫗哭無兒平居不作終身慊隂隲何須滿卷詩自是吾儕緣技癢此生未必欲人知送李提舉壽卿北上生平律已亦清嚴好察真如鏡出奩愈色奉親知幹蠱虛心接物得撝謙此風不已成忠厚他日無疑舉考廉臨事勿令圭角露世人多忌莫邪銛艮齋詩集卷六
