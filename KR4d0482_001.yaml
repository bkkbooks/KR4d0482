body:
  text: 艮齋詩集卷一元侯克中撰讀易六子相交父母純精微潔靜不沾塵經傳中古精含藴畫出先天妙入神表表四千餘卦體融融三十六宫春清溪滴露研朱客恐是尋行數墨人讀書汗簡煙銷費討尋漢家訓詁滿儒林豈期萬古千秋後得見三王二帝心孔氏壁藏多傅會伏生口授太艱深考亭去取無遺恨況復門人有蔡沈讀詩詩緯詩經各有三大音誰為發機緘聖功昭著終三頌王化流行始二南毛鄭形容多草草吕蘇頭角頗嶄嶄不圖刪定千年後玉振金聲滿晦菴讀周禮庶職班班總六卿聖人布置自天成一時美意行良法千古遺書號太平可怪獻王增外記不堪新莽盜虛名誰言制度傷纎悉宫府規模不厭精讀禮記劫火燔經亦有年曲臺倣佛記遺編誰將秦漢參周制我喜曽思得孔傳法度幸然存一二威儀徒爾説三千康成未解分經傳名物精詳亦自賢讀春秋西狩歸來泪滿襟麟經筆削示人深一言一字存褒貶真是真非盡古今二百餘年天子事億千萬世聖人心召陵城濮俱陳迹依舊乾坤一孔林讀論語聖學淵源豈易量一編魯語足輝光讀時似覺文詞易積久潛知意味長上知下愚終莫變朝聞夕死儘無妨大哉尼父參天地學者毋窺數仞牆讀大學赫然明命本諸天推已新民教乃宣心似鑑空方盡物身如山立適行權紀綱條達該精藴節目分明有後先賢傳聖經潛玩久乃知一貫不虛傳讀中庸人道須臾未可違聖賢微旨在操持不偏不倚存誠處無過無虧應物時小惡遂成千里繆至公寧許一毫私共知百世傳鄒孟一脈春風自子思讀孟子上下交征逐末流力陳仁義説諸侯衍儀巧搆當時禍楊墨深貽後世憂養氣每云無助長放心惟恐不知求吾儒尚有疑非論所見皆偏恐未周易説庖犧元不費搜尋竒自為陽耦自隂楚些吳儂皆已見郢書燕説豈初心伊川筆底天人備康節圖中旨趣深總被晦翁摸寫出朱絃三歎有遺音易學啓蒙四首大禹庖犧兩聖人所存所尚自超羣易傳龍馬圖中數範則靈龜背上文實外虛中元有體耦偏竒正豈無君非公善發堯夫藴千古何由得與聞右本圖書太極隂陽尚混淆一生為兩四還交象儀立後成三畫貞悔明時備六爻須信有情皆一本斷知無物不同胞等間寫出先天妙恨不同時載酒肴右原卦畫大衍神蓍五十莖體惟虛一用斯行圓神方知總千變分挂揲歸成四營錯綜統包天地數變通曲盡鬼神情邇來兩背雙眉語未審何由得此名右明蓍策讀易當明作易因玩占觀象果何人六爻進退時消長一氣飛潛道屈伸上下無常惟視變隂陽不測豈非神四千餘卦無窮事只有庖犧善寫真右考變占學易庖犧作易果如何信手畫成非有他陽卦自竒隂卦耦治時常少亂時多乾資剛健推元化坤以安貞保太和不有邵圖程傳出聖人心鑑定誰磨二氣周流貫六虛畫成竒耦法天樞百家技藝分全體四聖精神萃一書剖析經文輸正叔發揮圖象讓堯夫不知市隱成都客曽見山樵細問漁答學者問易索隱探微亘古今寥寥千載幾知音邵圖程傳從渠説羲畫周經各自心時有張華方鑄劒世無鍾子莫彈琴不從三聖源頭看枉向諸生筆底尋金縢百度惟貞罔不欽何憂羣叔自慆淫三壇面北求神切二載居東慮患深上帝動威彰聖德嗣王親逆應人心金縢未啓流言在禮樂安能到伯禽爾雅博士名官自漢初未應純是聖人書發揮五教雖無取訓詁羣經若有餘郭氏盛誇通豹鼠韓公竊笑注蟲魚九州作貢無遺憾四極為言恐涉虛老子一讀遺書了大綱好生毛羽惡生創華嵩不曰千陵主江海徒云百谷王方訝儉慈求勇廣更堪柔弱勝剛強一編魯語無窮意誰謂宣尼尚伯陽列子舉口談天似不羣漠然五太若為分螟巢蚊睫傷浮誕鯤化鵬摶駭見聞詞理遠超關尹説規模不出老聃文人間自此還多事千古誰能解此紛莊子理屈詞強本不任鄭聲猶恐亂韶音雷同老列才雖贍波及蘇張害更深敬長愛親咸有分絶仁棄義果何心六經皎皎明於日安用斯言玷古今莊生筆底似懸河詞愈誇張理愈訛作法必由名世者亂倫無奈異端何大椿必欲齊朝菌尺水徒勞起丈波一指苟存肩背失豈知方寸有中和荀子荀卿意欲祖宣尼立論胡為自背馳雜伯純王如有見議兵強國似無知當時言性非鄒孟繼世傳心是李斯天理不明人事謬更將何處較醇疵揚子訓詁諸儒等蝟毛子雲一出破喧呶法言取次侔論語玄贊分明體易爻獻技長楊嗟躁進失身天祿笑輕交區區自取千年誚枉對時人強解謿文中子朝有門生作大臣史無列傳等凡民不由正道干昏主敢以微言比聖人萬世遺經那可續一時私諡恐非真太平十二尊王䇿差勝揚雄獻美新釋氏禪分五派教三宗大道何嘗有異同男女悉歸三寶戒乾坤不待百年空死生怖我誠堪笑因果迷人恐未公梁武隕身還失國可憐虛費護持功太玄詞意艱深理亦精截然圖象似丁寧遠希經世雖霄壤僅與潛虛作户庭蹤迹本來宗禹範規模到底出羲經以三為用終無體有影誰能不具形七易聖遠言湮失正傳老來多幸得蹄筌元嵩未必能知易君實何須更擬玄體四豈惟元統世數三不過地承天紛紛衆説誰分别且讓文饒筆似椽參同契常笑楊朱為已忙六經今古日爭光氣為所役心為主操則常存舍則亡八卦方能成大化五行安得作純陽居仁由義平生了老盡天年亦不妨八陳圖説魚復圖成世絶倫設疑補闕在遊軍蛇從虎翼龍兼鳥風次天衡地附雲述陳馬隆十七贊握竒風后一篇文比來熟玩西山説千古英雄所未聞地軸天衡各有衝前為虎翼後飛龍翺翔雲勢形如鳥圍繞蛇蟠性似風孫武不謀符大易孔明有志躡髙蹤彌牟魚復成都市三者誰能較異同艮齋詩集卷一
