body:
  text: 艮齋詩集卷三元侯克中撰伯夷傳顔子知非肯復行伯夷惡惡豈容情服膺弗失終身樂食蕨能全盖世名雖死不亡仁者壽舍生取義聖之清二賢閫域人誰到只有宣尼集大成弔屈原懐襄為主子蘭卿何必逢人話獨醒長恨忠良多坎坷頗傷辭語太丁寜致君自合宗三代作法誰能過六經千載英魂招不得楚江如練楚山青吕不韋七國紛紛走戰塵是非顛倒亂天真老商正欲居竒貨太子適來求美人穢徳豈宜稱仲父狡謀殊不鑒春申利之為物誠何物解買嬴秦作吕秦項羽破釡沈舟北渡河英雄到此頓消磨入闗不解除秦法失路徒勞怨楚歌敵國豈專韓信勇謀臣惟一范増多子嬰見殺懐王死却歎虞兮奈若何張子房眼空寧顧虎狼秦博浪沙中義已伸才大儘消韓國恥功髙不作漢廷臣少從黄石能無我老伴赤松知有身獨坐掩書還悵怏寥寥千古更何人欲雪韓仇快所思自知舍漢復何之百年身退天之道三寸舌為帝者師借箸前籌銷印日坐沙偶語論封時朝臣方訝歸休早布越俄聞繫有司董仲舒上方用武定羌夷儒者宜為衆所擠大匠謾持脩月斧拙工先立倚天梯身為當代斯文主名與南山北斗齊許大闕廷無著處江都才了又膠西霍光質美材疎亦少文終將大事付元勛託孤有效今猶著殺后求全古未聞事覺便當誅霍顯家亡安得貴成君撥灰取火皆公力漢室重炎惜自焚二疏太子凡庸衆所知浩然歸志復奚疑齊宣尚不留鄒孟魯繆安能養子思亂兆國家全盛日禍萌禮貌未衰時人生大節行藏了二老當為百世師王莽少行謙謹衆咸稱將謂終全孝弟名掘地無成猶棄井履霜不已至堅氷忍傾王室為新室敢把阿衡比宰衡慚愧洛陽諸父老歡呼復覩漢中興嚴子陵羊裘野老鬢如蓬闊步長趍入漢宫伸足豈期驕萬乗掉頭殊不顧三公治平天下非無術格正君心儘有功一片釣臺髙幾許乾坤無處著清風鄧禹破敵安民舉可稱入闗何事若無能不收盆子慿三輔坐視樊崇壊五陵絶食自難全上策披圖誰料果中興君臨四海人臣了功冠雲臺豈未應諸葛孔明龍卧重淵不厭深草廬一論定浮沈輝光前後出師表膾炙古今梁父吟管樂權謀年少志伊周事業老來心錦官城外森森柏千載清風播令音石崇金谷繁華日日春錦為步幛蠟為薪綠珠一死無遺恨白首同歸有故人到此豈如居甕牖從前可惜拜車塵吾儕只合遵名教陽虎從他自不仁陶淵明彭澤幡然便挂冠老懐還比向來寛興隨緑蟻凌秋色心與黄華共嵗寒述酒一篇知已少折腰五斗向人難無弦琴裏無窮趣不為時人取次彈滄海横流懶問津歸來博得自由身有田不肯栽秔稻漉酒何妨解葛巾身外一毫皆長物世間萬事等微塵寧為黄菊籬邊客不作白蓮社裏人九日懷淵明苦節清才素所長千年有客過柴桑五株緑栁門闌貴三徑黄花姓字香老去惟書宋甲子歸來獨擅晉文章南山正在悠然處聊為西風舉一觴張柬之定武氏亂孟將八袠氣横秋決策興唐廢偽周謁闕未聲諸武罪斬闗先取二張頭龍韜虎畧須臾定鳯閣鸞臺取次休留得三思元惡在相君寧免死新州濓溪周子教弛經殘失所宗先生一起破羣蒙圖書往聖前賢後人物光風霽月中道妙無窮庭草綠心香不㫁渚蓮紅千年伊洛淵源盛總是濓溪一脈功邵子無名公傳夷未能和惠未清如公端合號無名天人一貫用而體心迹兩忘安且成醉裏乾坤元廣大空中樓閣更髙明陽竒隂耦些兒事説盡天機與物情藜羮布被了生涯隨分人間玩物華老去幾時曽廢酒春來無日不看花乾坤擊壤三千首風月行窩十二家心學有源窮未得且容張祝泛靈槎康節墓誌公自蘇門至洛川天津精舍水南田畫圖既别方圓體觀物仍分内外篇千古河山風土厚一時人物主賓賢自慚未得先生趣空抱遺經二十年王安石天變人言豈易欺祖宗不法欲何為木離規矩徒誇巧病入膏肓反忌醫千古宣仁皇后傳一時元祐黨人碑宋亡畢竟從君始配享文宣恐未宜題韓蘄王世忠卷後砥柱中流障怒濤折衝千里獨賢勞馬頭斧鉞丁年盛驢背湖山晚節髙風虎雲龍機易失城狐社䑕罪難逃區區苟活偷安輩泉下相逢愧爾曹題池州倅趙忠毅漢卿死節卷後半生佩蕙復紉蘭一夕芳馨滿世間臣報主恩今尚少婦從夫死古尤難一門大節傳青史千載髙名等太山欲向長江問心事悠悠東注水聲寒題陸君實死節卷後宣公苗裔有餘馨耿耿丹心醉六經獨力生難扶社稷全家死不負朝廷世間民聽猶天聽海底台星拱帝星嵗月不消忠義氣崖山十倍向時青艮齋詩集卷三
