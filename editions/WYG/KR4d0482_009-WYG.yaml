body:
  text: 艮齋詩集卷九元侯克中撰春夜感興乾坤何廣大海嶽亦洪厖剰把花簪帽長留酒滿缸論友期管鮑任術笑孫龎萬里非難到千鈞未易扛酒添詩興健茶壓睡魔降大厦凡材構鴻鐘寸草撞歸鴻投逺塞行客避危邦夜雨愁喧枕春潮怒拍江覉懐嗟白首孤影對青釭林暗栖鴉亂巢危睡燕雙奔騰哀瘦馬勤苦歎羸厖獨坐便蕭散羣居厭亂哤豈無人佀玊安有茟如杠謾賦寧拘韻髙歌不問腔曉鸎嗁未竟紅日滿東窗宿酒成疾寄劉簽事老懐嗟永夜瘦骨怯初寒衾薄抽添易樓髙上下難酒須因病戒劒不為貧彈患失仍多失求安未必安茍交雖蹔合彊飲不成歡聖教無窮趣吾儕莫厭㸔秋夜旅興烟盡香猶在更闌睡不成井梧留夜色牕竹起秋聲老去悲長鋏愁來賦短檠恥隨蒼狗變甘與白鷗盟節義千鈞重功名一羽輕江湖容我老蓑笠有誰争首夏偶作鄉闗一萬里客路十三年緑樹清隂晚黃梅細雨天虚堂巢舊燕古寺咽新蟬囬首松楸夢慿闌一泫然白首白首天涯客飄零每自怜小牕千里夢髙樹一聲蟬砌筍將成竹池荷尚未蓮故人應念我日日望歸船地僻地僻多生竹樓髙易得山水寒魚倦出日暮鳥知還嵗月琴書外乾坤杖屨間問君千載後如我幾人閒獨酌囊裏青蚨盡簪邊白髪多苦唫中有意痛飲外無它嵗月悲長鋏乾坤入浩歌醉鄉忘物我塵世任風波一榻一榻風如水南牕日又斜花香迷燕雀樹影動龍蛇土與人情薄江連客夢賖行藏元有命志士莫吁嗟秋興少時無所求老去復何憂醉夢齊生死閒身任去留琴書消永晝松竹慰窮秋最愛寒花好霜餘香更幽秋日懐古老樹多黄葉閒庭半緑苔鴈銜霜信過菊趂雨晴開句踐仍無國姑蘇空有臺莫因前日錯復使後人哀夜雨感懐嵗月人空老風雲興已闌心灰香燼冷夢短燭花殘未悟謀身拙徒嗟涉世難五更風色惡一枕雨聲寒雪風吼千林怒雲垂四野低入簾花帶雨落地絮沾泥水凍魚難釣山寒馬不嘶田翁方報我隴麥已生齊春日即事草木萌方動乾坤氣已和杯深浮臘螘波暖浴春鵞岸口氷初泮山隂雪尚多古今因世革通塞奈時何老懐老懐多悵怏歸計日徘徊曉逐雞聲發春隨鴈影囬朔方猶見雪南國已無梅囬首家千里傷心酒一杯十四夜月蓂莢生將滿桂花開未全常留千里色莫放十分圎海角經年客壺中不夜天𤣥霜在何許擬問廣寒仙讀復卦七日始來復一陽消衆隂雷從泉下動春入草根深因見鬼神跡廼知天地心發生容有漸消息又成臨漫興道德非虚位聲華恥過情林宗稱有道康節號無名自分書為友何須禄代耕人間多劒㦸林下獨升平寄道者樓外山如㦸江南菊又花鳯鳴𤣥浦月人隔赤城霞别後身雖健歸來鬢已華百年能幾日大半在天涯老去老去無佳興朝來得好音寒花因雨瘦秋草帶烟深斷續風中笛蕭疎水外碪遥知今夜夢不負故人心秋夜懐友倦客傷秋晚踈砧搗夜闌星河千里淡霜樹五更寒鴻鴈闗山阻豺狼道路難故人雖念我冠破不堪彈客懐世無雷煥劒誰聽伯牙琴湖海千鍾酒闗山萬里心義當完趙璧禮不受齊金牢落天涯客寒牕半夜唫獨樂南畆春方動西山晚更竒江聲來斗帳天影落盆池不厭花開早常嫌酒熟遲聖賢千載意今古幾人知郊行物逐年華變霜催鬢影皤向陽芳草盛瀕水落梅多塵土埋長劒乾坤入浩歌沙鷗無一事江上自風波春來春來連日雨沙路净無泥地迥雞聲逺江空鴈影低麥苗青出壠菜莢綠成畦物態叅差甚莊生莫彊齊荅白仁甫别後人空老書來慰所思溪塘連轡日風雨對牀時我愛香山曲君竒石鼎詩何當湖上路同賦鷓鴣詞思歸桑榆催晚景桃李又春風過眼千頭橘驚心兩鬢蓬每憐南渡客深愧北歸鴻安得豺狼盡常令道路通漫興一尊陶令酒千首杜陵詩每到勞心處還思得意時自榮還自辱誰黠復誰癡試向天公問天公未必知把酒把酒澆詩興烹茶遣睡魔春風欺鬢短晴雪上髯多雨過山如染潮平水不波可人雙燕子時向草堂過呼童呼童邀好客擕酒上髙臺傍路栁先發背隂花後開魚因新水出燕為故巢來明日人重到殘紅滿緑苔相逄相逄連夜飲同賦送春詞月淡人歸後風香花落時青山雲外髻白髮鏡中絲憔悴麻衣客天涯愧紫芝嵗首嵗首傷多雨朝來喜乍晴曉山青黛淺春水碧羅平鳩拙行藏易鷗閒去住輕莫辭今日醉聊盡故人情春興斷續催花雨侵尋禁火天海棠猶半醉楊栁已三眠風軟鸎啼後雲輕鴈去邊幾時人事了同結住山縁途中遇雪爛漫雲垂野須㬰雪滿天寒多龜手拆吟苦鶴頭偏不見戴安道還思孟浩然典衣􅂸一醉應向酒家眠倚樓老去時時病春來日日隂鏡中雙鬢影枕上四更心每厭紅螺淺長令緑蟻深悠然清興動聊作倚樓唫老懐江湖空自老涇渭欲誰分萬事樓前水孤身海上雲雨多徒有歎天逺寂無聞滿樹昏鴉閙鵷雛獨不羣觀物人世常多故天機不少停竹兼庭草緑山入市樓青才見風中絮俄為水上萍螟蛉與蜾羸一笑付劉伶夏至鹿角乗時解蟬聲向曉新隂㣲猶可畏女壯豈宜親羸豕將為祟包魚不利賔髙明逺聲色謹此勝調神秋感鴈書千里至客櫂幾人還江窄風潮怒天髙雨露慳每嗟巢燕苦多愧海鷗閒莫謂林泉逺開簾盡好山感物南國秋將半西樓夜未央驚烏投逺樹飢鼠穴空牆緑竹寒篩月黄花晚傲霜一聲隣笛起彷彿在山陽初寒盡日閒欹枕經年不捲簾詩懐因病減酒量為寒添市近無人到牆空有鼠嫌北風應念我吹雪上茅簷寒夜囊罄書猶富途窮道自通髙梧留海月老檜撼天風攪睡茶無賴驅愁酒有功梅花消息好春到角聲中艮齋詩集卷九
