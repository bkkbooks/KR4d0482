body:
  text: 艮齋詩集卷七元侯克中撰和張夢符侍郎海青韻青鳥東來俊有神天恩三錫表殊勲雙眸怒掣空中電六翮雄摶海上雲鴻鵠低飛羞歛翼鷹鸇逺避敢同羣錦鞲一縱頭鵞下禁臠從今到相君謂蒙古岱丞相和張可與正月牡丹韻花神巧奪化工權試手東風到眼前素愛國香持晚節豈期妖艶見新年洛中謾説惟三月江左還疑有二天松柏嵗寒依舊好一枝休詫得春偏和徐容齋廉訪梅花韻萬木歸根總待春一枝獨與嵗寒親逋仙只合西湖上大老何妨北海濱塵世氷霜難奪志玉堂風月解傳神知君欲近孤山住從此幽花得主人和徐容齋廉訪蘭花韻買蘭多種相隄沙要看春風碧玊芽百代幾回呈羙瑞一年兩度見幽花周經既許同心臭楚些何須抵死誇從此伯鯈持入夢東南復覩謝安家和呉曼慶中丞御史臺盆池蓮花韻堂下荷香散水沈澹然相對柏森森若耶溪妒金盆貴太華峰慚玉井深夲固實甘君子德中通外直聖人心好將千載濂溪説勒作西臺御史箴木芙蓉落盡羣芳木葉黄數枝絳雪暎寒塘晚於紫菊嬌無艶早似紅梅冷不香萬里西風霜信逺一天清露月波凉多情留得幽花在莫謂秋容只淡粧盆梅前村移入小陶盆不比從前自在身出塞昭君回首怨入宫妃子捧心顰幽香宛轉紗窻曉瘦影徘徊紙帳春曲直作酸誰㑹得園夫豈是傅巖人梅花前村雪裏舊精神瘦影幽香自可人和靖不傳詩外妙師雄空説夢中身松筠有素為知已風月無私解寫真庾嶺儘誇千樹好傅巖獨讓一枝春紅梅二首恥隨繁杏閙清明先欲羣芳識姓名裝臉韻憎鉛粉淡醉魂香遶玊堂清春風紫府多幽思緑葉青枝近淺情寄與題詩樓上女莫教偷折入神京厭見蜂兒蝶子狂早將顔色奉東皇半酣宿酒迎春思一抹胭脂趂曉粧桃蕚定無如是韻杏花那得許多香風流標格誰題品只許坡僊解發揚蘭花幽谷佳人不世粧澹然相對兩相忘偶從詩興濃時發或向禪心定處香孔父琴中傳雅操楚臣筆底藹餘芳冰根玊榦元貞潔肯與凡花較短長石榴騫使淹留海一涯歸來得種載靈槎恥隨桃李三春艶寧伴萱葵五月花青錦帳懸紅碼碯黄金爐煉紫硃砂不緣孝武開西域方物安能到漢家白牡丹皎皎名花壓衆芳剪氷裁雪作衣裳洛神豈受塵埃染虢國不煩脂粉粧非色能專天下色有香絶異世間香姚黄魏紫休相妒從此春風屬素王讀李太白應制妃子對牡丹清平調鳯輦匆匆出未央要看妃子對花王畫闌咫尺爭春色寳鑑分明妒曉粧紅玊有情還解語彩雲無意却能香誰知太白清平曲不是新聲是諫章賦呉家園牡丹興慶池東舊姓名館娃宫裏避清明眼中國艶春無價意外天香畫不成芍藥剖符分列國海棠率衆竪降旌姑蘇春色濃於酒醉殺西施省用兵桂花恐礙銀蟾吐夜光故移丹桂到炎方一枝天上何年種八月江南到處香幸與紫蘭均雨露厭隨黄菊戰風霜等閒童豎皆能折何事紛紛舉子忙梧桐虚心直榦得春遲花始東南應絜齊剪葉未容天子戲折條忍礙鳯凰棲聲傳金井秋風早影轉瑶階曉月低已見鳴琴他日操老枝夜夜聼烏啼梅商周只説實堪用唐宋盛傳花好看詩愛四更窻影瘦夢嫌三㺯角聲寒雪深庾嶺香初動酒盡羅浮興未闌移向茅齋慰衰老免教深夜倚闌干落花一片西飛一片東半隨流水半隨風馬嵬魂散香囊冷結綺人歸玊樹空幽鳥有情啼院宇斜陽無語入簾櫳主人不用閒惆悵芍藥朝來數㸃紅海棠䴏蹴鶯捎力不支緑攢紅簇擅芳時醉酣曉日霞凝臉睡足春風雪滿枝得意總輸坡老句闗心惟欠少陵詩恰如西子新粧罷困倚闌干有所思楊花風裏楊花自在狂枉將巧態媚東皇香緜遍地蒼苔冷飛雪漫天白日長偶趂蜂兒來客舎慣隨燕子過隣墻甫能吹入東流水化作浮萍剗地忙酴醿過却清明景已闌酴醿未肯放春殘緑羅數幅連青錦白玊千重簇紫檀顔色何嘗饒臘酒芳馨惟恐勝秋蘭晚風吹落枝頭雪謾作尋常粉蝶看櫻桃江北江南氣未殊朱櫻首夏遍通衢閭閻競喜甞新好籩豆還曽薦廟無錦樹深藏朱雀卵玊盤勻瀉火龍珠野人莫詫筠籠貴幾向唐宫伴筍厨荷葉五月西湖最好看緑荷千頃水雲寒淨磨洛浦玻瓈鏡香靉龍宫翡翠盤青盖拂船撩逸興碧筩酌酒助清歡且留遮䕶閒鷗鷺驟雨狂風莫打殘庭下兩枯槐亭亭相對兩枯槐落莫如人與世乖獨立我慚君有伴虚心君似我忘懷晚凉不礙風生坐夜永長留月滿階謾説南柯深處好定知無夢到吾儕蠏稻熟爭持貢厥魁秋交觱沸指江來兩螯白雪雖珍品滿腹黄金即禍胎電送驚雷良可畏火明横㫁竟堪哀操戈努目成何事只與入間薦酒杯食蛙食月蟾蜍即此流瞠然兩目怒無休蒹葭影裏才多口椒桂香中已出頭今欲無聲猶可禁昔嘗有尾最堪憂越人似信盧仝語爭與姮娥復舊讎烏賊魚每因食月恠蟾蜍醜類何堪賊曰烏幸託滄溟亡後患彊令黒水作前驅有鬚縱免風濤難多足能逃鼎爼無啖肉未償臣子恨直須粉骨謝餘辜蠅喜親臭穢避芳馨殘瀝餘杯不顧形㸃綴綺羅移黒白往來圖畫汚丹青食瓜遽集存良史止棘交讒見大經早晚霜風清海宇若將何術誑天刑鳩雄倡雌隨盡物情錦鳩抵死太饒聲居巢似巧營巢拙逐婦將隂喚婦晴鴻雁有丘同苦楚鴛鴦無日不和鳴邯鄲簡子何多事正旦全生未必生閒蛬寂寂虚堂萬籟沈月明蟋蟀動秋唫喚醒隱几詩人夢呌碎停梭織女心越䇿丁寧憂國切楚詞反覆愛君深西風不管天涯客又送誰家半夜碪桃花馬曽向瑶池侍穆王天風吹入武陵鄉丰神肯逐彩雲散汗血不消紅雨香千里有心追暮景四蹄無處避春光龍媒豈是天台物雌蝶雄蜂枉㫁腸贈張秀之斫鱠東南佳味冠珍殽况復張生思致髙錦鯉失身離雪浪銀絲隨手落霜刀掃除宿酒歸岑寂管領春風破鬱陶安得謫仙同一醉倒傾滄海斫鯨螯虎頂杯虎頂誰將作酒觴風生四坐凛寒芒等閒刻骨疑馮婦談笑搔頭信杜康生勇定為行旅害死威猶使飲人狂夜深倀鬼分明説白額新聞爵醉鄉馬乳馬湩甘寒乆得名飲餘香遶齒牙生草青絶漠供春祭燈暗穹廬破宿醒冷貯革囊和雪杵光凝銀榼帯酥傾漢家屢有和親好恨不當時賜長卿題子房燒棧道畫卷劒閣崔嵬烈熖飛漢兵從此不東歸三書未奮炎劉業一炬先収暴楚威立致英彭朝紫禁坐邀園綺侍青闈功髙不預麒麟畫留與龍眠重發揮艮齋詩集卷七
