body:
  text: 艮齋詩集卷二元侯克中撰堯文思欽明四美全龍飛九五應純乾民懐帝徳終千古聖筆虞書第一篇隨物生成惟體道與民休戚更同天執中豈是丹朱任只許重華得正傳舜歴山雷澤復河濱非舜誰能處此身孝瞽慈均全父子事堯讓禹盡君臣四門既闢羣兇去五教惟寛百姓親莫怪古今疑未信聖人所以異常人夏君讓臣辭悉至公此身雖異此心同民憂洪水巢林表天錫神龜自洛中但以啟賢承大統豈知桀虐廢前功祖宗創業多艱苦未見兒孫克有終商成湯放桀尚包羞豈料商辛在後頭方訝雉飛升祭鼎俄聞魚躍入王舟九重自謂為君長四海皆如疾冦讎不是武王容不得三分天下二分周周鉅橋積粟鹿臺金散向人間徳澤深倒載干戈銷耒耜立收牛馬放山林範疇自合詢箕子禮樂何須賜伯禽八百餘年文武業可憐終快虎狼心秦力掃羣雄廢赧王轉頭吕政代莊襄宫中自笑鹿為馬天下誰憐狼牧羊方羨豐碑磨碣石不知刼火到阿房百年枉作千年計萬世何期二世亡漢入闗約法得人情素服興師欲正名代邸歸來生意溥茂陵老去悔心萌中興事業推文叔末造艱難賴孔明霸自有餘王不足區區魏晉敢争衡魏天運循環不可逃小人奸險亦徒勞金刀未許全歸魏石馬先書大討曹羿莽罪盈滄海濶伊周名壓太山髙城狐社鼠休誇巧無限蒼鷹未解絛晉典午機深禍亦深馬頭牛尾日相㝷託身建業雖天限囘首神州已陸沈元海不臣為亂首寄奴有國是甘心建興已後皆非晉何事新亭泪滿襟南北朝宋興齊霸總權臣惆悵宣城又夕曛同泰舍身何可恃後庭遺曲不堪聞掃除釋氏輸元魏摹倣周官笑宇文始末不知誰授受欲書統緒竟無君隋江北江南總戰場一時民物萃開皇九重鳯闕秦闗壯萬里龍舟汴水長誰遣張衡留大寳天教化及隠蕭牆憸人豈得專華夏除掃乾坤待有唐唐楊葉凋零李樹穠義旗一舉滅羣雄江河不洗滔天罪海嶽難酬盖世功甘露怒流朝士血荔枝香染驛塵紅晉陽智術臨湖勇女禍閹權即此風五代誰料朱三起禍端獨憐李二作伶官販夫亦得王藩鎮中國何疑祖契丹守節惟聞貞婦死迎降反作重臣看堂堂周末賢君相梟獍羣中見孔鸞宋五季惟周覺最賢陳橋一夕宋山川得從寡婦孤兒處失向庸人孺子邊前後共成十六主東南分據百餘年愛民養士雖堪尚畏敵親讐亦可憐漢髙祖芟夷暴楚滅彊秦約法猶能蹔假仁信越有功終見殺綺園無自肯稱臣毎因納諫稱明主幾為分羮作罪人無黨無偏王者事只除湯武得丘民武帝不向江都起仲舒却從狗監召相如十洲三島非常道萬户千門豈廣居海上謾勞求馬使宫中徒隠飯牛書老來肯下輪臺詔猶勝秦皇載鮑車漢郊祀志入海童男竟不還漢家宫殿盡齋壇帛書遽忍開牛腹紫禁空傳食馬肝曉取露華和玉屑夜調火候養金丹一從五利文成死漸覺求仙興味闌光武髙皇大度可同符石勒何人敢並驅天命已知歸赤伏世情猶怪慕金吾宫中嫡庶疑非道泉下忠良似不辜咄咄子陵真有見富春耕釣豈狂奴獻帝命在權臣掌握間洛陽焚蕩又長安中材必得扶持易貞疾情知救療難亂首自來譏董卓禍胎畢竟罪曹瞞温公議論文公筆留與髙明後世看晉惠帝四葉憸謀到永熙成難壊易亦堪悲椒房未免吞金屑茅屋那能食肉麋牛禍已知興叛亂蛙聲何必限公私秋風思子臺邊泪先帝曽言是汝兒隋煬帝張衡入侍帝升遐罪惡宣華過麗華三閣不容歌玉樹六宫還許幸瓊花后妃共駭悲頭頸驍果同謀奮爪牙天網似踈元至密禍機終自宇文家唐臨淄王定韋氏亂鳯閣鸞臺未正名斜封墨勅已公行腹心致疾由安樂骨肉相殘自太平魑魅迭興天宇暗鯨鯢戮盡海濤清時人莫訝三郎勇見説楊家女已生𤣥宗老盡開元柱石臣轉頭天寳一畨新禄兒出入稱皇嗣妃子歸來號太真芍藥勝開三月宴海棠獨得六宫春馬蹄蹴踏殘紅盡此日君王不敢嗔感𤣥宗夢𤣥元事集賢宴罷氣如虹底事𤣥元遂感通天下未聞求傅説枕中安得見周公乗輿道路連雲險禁苑繁華掃地空祈福不應翻取禍寳山符瑞果何功感唐史事閹宦當朝百不堪彊藩在外恣饕貪一從羯鼓興河朔幾度鸞輿幸劍南宰相未須譏鄭五帝王不久到朱三雲翻雨覆成何事只與漁樵作笑談玉清昭應宫災琳宫一夕雨中災烈熖燒空走迅雷三月阿房猶見火五更昭應已成灰范雍奏對言方切莊獻經營意始回一自定陵深閉後更無符瑞自天來宋髙宗二首樗櫟凡材作棟梁中興事勢已膏肓無厭割地盟雖定不共戴天讎可忘版築已虚商説夢諒隂仍短漢文䘮榻前何止容人睡喪斧甘心巽下牀龍樓久廢問寒暄罔極深恩未易諼四海一心伸大義九重獨㫁割中原夫差詎肯忘君辱嵇紹安能洗父寃屈膝請和姦計就禮經從此是空言艮齋詩集卷二
