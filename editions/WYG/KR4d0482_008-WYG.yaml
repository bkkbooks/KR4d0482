body:
  text: 艮齋詩集卷八元侯克中撰諧音格詩貴於音韻諧叶此卷用韻一以音同字異者為之自我作古後或有取焉七言三十一首老懷世故紛紜莫異同碧雲無處覓崆峒嬌鶯盡日啼宫栁威鳯何時到井桐四海共憐今白髪百年多愧古青銅老懷悵怏憑誰説空對吴鈎賦狡童秋嘆塤箎絡繹雜笙鏞倒徴顛商似反庸秦室君臣何足校漢家兄弟不相容獼猴有智縻天禄黠䑕無端穴我墉莫向窮秋歎摇落菊花開罷到芙蓉河漢河漢誰能跨石矼世無烏獲鼎難扛雪深吏部悲秦嶺天逺靈均困楚江堅苦寸心窮斷簡伶仃孤影弔寒缸凝之滿篋廬山句獨讓歐公筆似杠題李太白畫卷謫僊宫錦慣淋漓耳熱那分㫖與醨邀月滿傾紅琥珀對花細卷碧琉璃但知酒後無今古豈信人間有别離九萬大鵬千載賦善言斥鷃笑藩籬雪中懷古北風冽冽雪霏霏吹入幽人白板扉萬事只宜今後拙百年渾覺向來非人能射策仍拖白猴解隨班便賜緋倚杖長唫重回首亂鴉寒遶故宫飛懷隱草莽常為市井譏豈知老蚌有珠璣隴禽馴習真堪教野馬猖狂不受鞿誰謂淺山無猛獸我嘗平地履危機自從潦倒嚴陵後閒殺桐江舊釣磯隱居生平志不在冠裾竹簡韋編伴隱居刺棘自難生橘柚木瓜誰望報瓊琚歸休未遂膏腴地出入還乗下澤車白璧暗投猶不智况將韶樂祀鶢鶋毁譽晝寢何須學宰予吾儒經訓即菑畬濁賢清聖糟醨外㫁簡殘編煨燼餘生死形骸真傳舎古今天地大籃輿百年人物存公論閒是閒非自毁譽感事路傍山鬼慣邪揄笑我無成六十逾滿野干戈嗟馬援拍江風火壯周瑜當時已分終蕭散此日那堪復覬覦莫把良田栽枳棘儘教閒地種桑榆野興杖策從容訪酒壚野人相贈四腮鱸一溪碧水千竿竹萬仭青山兩岸蘆虚室香生新紙帳小忩烟裊古銅鑪醉魂正到悠然處恨殺隣翁轉轆轤懷聖北海長蛟尚可屠何難探穴取於菟堯夫首發先天藴茂叔心傳太極圖静玩遺經君子志力排邪説聖人徒感麟悲鳯宣尼事無奈豺狼塞正途山館雲外飛鴻片影孤露寒烟冷爾何辜竒材未肯非時出羙玊須求善賈沽閒折野花簪破㡌静邀山月酌清觚行人莫道天涯好試向林間聴鷓鴣懶向懶向王公話挈提浩歌誰和白銅鞮百年蠻觸爭蝸角萬里闗山愧馬蹄杜宇一春花外語鷓鴣終日路傍啼黄金已滿相如篋休向長門請賦題老馬老馬思鄉尚北嘶三年旅食淛江西無知已足憐河伯有感能通愧海羣應物未嘗虚領略向人寜問巧提撕南方見説鵷雛鳥不遇梧桐不肯栖漫興生民有賴自姜嫄萬物雖殊夲一源今見龍虵生大澤昔聞人物出中原託身未許期倉䑕染指何須試鼎黿盡説傅巗消息好定施霖雨到黎元郊行黄犢從容駕短轅溪聲留客碧潺湲霜催木葉辭髙樹雨積莓苔没廢垣井鮒豈知東海龞野人何愧北山猿老來莫道無歸計到處烟霞是故園偶書人是人非了不干起來紅日已三竿不才安敢爭頭角莫逆何妨話肺肝秋水逺融青翡翠晚山濃染碧琅玕菊花過盡梅花好莫放金樽取次乾春懷春風細細鳥咬咬似喚幽人出近郊芳草有情留驥足落花無計續鸞膠家貧只與詩書友性僻常踈勢利交伴老幸存蒼竹杖恐隨雷雨化神蛟雪夜悍吏跳梁怒石壕殆如飢虎恣咆嘷百年勝負爭蝸角萬古興亡属兔毫雲黯窮邉寒雁切雪迷絶澗夜猿號灞陵驢背吟詩客千丈凌雲意氣豪山行紫藤扶我過江臯石徑陂陁歩歩髙花蕾破香風似麝麥苗霑潤雨如膏曉開烟嶂山千疊春滿溪塘水一篙民物太平吾亦樂滿盤苜蓿勝豚羔飲興右執春杯左執螯醉鄉容我獨逰遨十年四海凋雙鬢一日三山舉六鼇寒賴仁風蘇凍餒旱須膏雨潤焦􅆈珍禽竒獸將安用千古周書貴旅􅆈自警潢潦無源起怒濤鏡中妍醜豈能逃茍無逺慮休非孟縱有清材莫和陶細碾臘茶烹橄㰖淺斟春酒泛蒲萄幾時坐對緱山月兩袖天風醉碧桃暮寒自淮逹浙最為嘉寸草撞鐘力不加南土積烟成癘瘴北風吹雪入哀笳滿頭白髪為人贅何處青山是我家海氣接天寒透骨鴈聲酸楚過蒹葭即事白屋飢民不自遑朱門豪客厭絲篁眩人令色濃於酒誤世甘言巧似簧但見山林多虎豹豈知城市有螟蝗野夫心上渾無事飯飽山隂斸地黄題王右軍帖右軍筆底走雷霆灑霧揮雲肯少停彩鳯不羣凌碧漢白鵞無數換黄庭森森喬木勞羣螘落落洪鐘謝寸莛取次墨工休健羨大鵬元不較蜻蜓宿山寺絶壁懸崖勢建瓴一溪寒溜玊泠泠曉來幽谷蘭芽好秋入髙林木葉零萬壑天風推破戸四更山月射踈櫺身如盤石心如鑑水恠花妖竟不靈自遣愁外年光逐水流冷泉脩竹為誰留十年白屋窮經史一日丹墀對冕旒功業未應慙鄧賈文章何必羡曹劉筆端莫冩無稽語免與騷人作贅瘤漫賦塵土青衫半九州甘貧殊不待人賙兩輪日月雙明鏡萬里乾坤一釣舟大道未聞空白髪小乗猶説有滄洲憑誰試向莊生問夢裏何分蝶與周自憐三十年來百自由自憐踈略乏嘉猷湖山落魄林和靖鄉里蹉跎馬少㳺人笑鯤鵬同斥鷃道觀天地等蜉蝣幾時還却兒孫債江北江南汗漫逰自况國易家難自不侔毎傷嘉榖産螟蟊擇妻敢學諸葛亮生子漫期孫仲謀犧象豈宜盛秕稗貂蟬未信出兠鍪為函為盾尤當戒况復專攻矢與矛至諴人鬼天神享至諴易牙與我共酸醎亡羊自是多岐路馭馬誰能撤轡衘破敵何須驚折屐報書底事逹空函紛紛情僞誰能辨擬著莊周問季咸五言二十一首獨立壯士凌雲氣長天貫日虹鴨頭春水緑鶴頂晚霞紅歸計謀陶令還丹問葛洪故人音信㫁倚檻待邉鴻卜隱静拭胷中鑑深藏舌上鋒清時消海瘴長夜息邉烽每報營巢燕兼憐釀蜜蜂西湖容我老㸃檢兩髙峰春曉雪色侵雙鬢霜威逹四肢明堂㣲欲側大木尚堪支曉日花千樹春風酒一巵東皇生意溥開到背隂枝歸思白雪無人和青山足自娱我知陶令趣誰謂屈平愚闗塞家千里風沙海一隅能全巢許樂舉手謝唐虞憶家謬跡恒千里虚聲動八區人情多險阻世路更﨑嶇嵗月凌衰髩風霜虐病軀故山猿鶴在為我作前驅有感乾坤司大化雨露遍勲臣四瀆朝東海羣星拱北辰寧教雄雉怨毋使牝雞晨民力今如此何由逹紫宸安分百年殊迅速萬類儘紛紜書癖何須治田荒不暇耘棲心同止水應物等行雲天理分明甚前途莫預云春興繁杏花盈樹柔桑葉滿條鶯隨林影囀魚趂浪花跳和璧非難識襄琴未易調故山何處是江逺路迢迢村居宿酒醒猶倦呼童癢處搔麥秋和月刈蠶晚帶燈繅閒坐談羲易徐行詠楚騷閉門無客到􅆤竹自颾颾春前後㑹知何地前途未有涯親朋嗟鬼録官府愧蠭衙曉角驚梅萼春盤薦􅖋芽新年消息好鵲喜到簷牙通材小智專條目通材正紀綱龍須潜大澤虎不卧平岡易舉千鈞鼎難摧百錬鋼聖言真可信棖慾豈能剛江館夜坐獨坐不成寐清唫誰與賡大江天一色孤館月三更鷗鷺真堪友蓴鱸儘可羮晨昬何迅速為我問長庚禮樂宣化琴仍瑟平心竽與笙政須遵五禮孝不在三牲魯衛方兄弟朱均適舅甥是非無處問俯檻看雲生明理道德淪空寂綱常墮杳㝠占天懷舜政對月憶堯蓂洙泗通三古濂伊逹四溟百家與諸子歛手愧西銘逰道院水繞庭中竹風鳴殿角鈴撥雲収橡栗趂日晒參苓杖曳蒼龍脊扇揮青鳯翎石壇松影畔相對話延齡得意抱膝雲間笑掀髯月下謳倉皇嗟溷䑕蕭散愛江鷗得意詩千首忘言酒一甌人生何足嘆天地等浮漚萬事萬事皆芻狗羣生等棘猴與求尸位相寧作醉鄉侯儀衍空饒舌孫龎竟扼喉古今都勿論持酒聴箜篌述古溪風動幃幙隙月入衾裯斥鷃多朋黨鵷雛少匹儔出師諸葛表銷印子房籌千載殷仁後慿誰問九疇天涯荆人悲有玉季子恨無金日月誰消息乾坤自古今酒杯澆肺腑詩筆冩喉襟莫話人間世天涯思不禁懷友蹤迹藏人海聲名貫士林同年皆館閣相識盡球琳老屋多摧毁髙軒屢照臨野雲自舒卷豈解作時霖月夜連日雲籠月今宵鏡出奩竹聲來曲徑花影入踈簾静想髑髏樂閒思蚯蚓廉油然髙興動誰與問青帘艮齋詩集卷八
