body:
  text: 艮齋詩集卷四元侯克中撰冬至一氣凝然本混淪陽升隂降亙為根自强不息天行健德合無疆地勢坤夏至姤成冬至復南㝠鵬是北㝠鵾人間不有羲經在千古誰開道義門五十五十無聞只自憐塊然癡坐誦遺編恥逢伯玉知非日况値宣尼學易年紙上權衡先審諦胷中規矩自方員克治存養惟求已禍福窮通一聽天客有是異端而非正學者為賦此曲徑偏蹊亂似麻出門忘返不知家卧龍盡日藏頭角跛鼈乗時眩爪牙澗柏巖松千載樹野桃山杏一春花嵗寒然後存公論枉對鶯鶯燕燕誇姚左丞席上談釋老為仁非易亦非難心廣應知體自胖克已要從偏處克觀天須向静中觀巍巍聖道明三極藹藹吾心具四端大命赫然人莫守古今宜被二家瞞静中寂寂虚齋晝掩門静中消息若雷奔白駒自逐隂陽變𤣥牝豈非天地根須信復來將有泰安知剥盡已無坤髙情千古堯夫老恨不同時與細論感興二首乾坤生物本無私暑雨祁寒尚怨咨緯地經天惟有易移風易俗豈無詩堂堂張也非吾友穆穆文王真我師坡老不知縁底事却將秋水洗茅茨駸駸讀盡世間書勘破先天太極圖千載愛蓮周茂叔一生觀物邵堯夫屈信相感心無累敬義兼行徳不孤莫買扁舟作歸計市廛初不異江湖感事二首往聖遺經自古今探微索隠費搜㝷格通物理知天理克盡私心見道心惠子自宜貪腐䑕鄒公元不受兼金反求屋漏終無愧何事風波萬丈深真是真非豈易論誰教涇渭各清渾風波始信生平地日月終須照覆盆潁水幾人曽洗耳楚江千古謾招魂何時細語梅花底滿意春風酒一尊動静昭然動静兩相因枯木寒灰恐失真太極圖中觀二氣渾天儀上看三辰神龍尚且隨潛見尺蠖安能免屈伸地坼水氷寒正爾九原無處不陽春為政欲知為政果何如私意纔萌便掃除妍醜豈能逃藻鑑塵埃初不到氷壺日間接物常持敬夜後潛心細玩書平旦氣清還致用不須更下别工夫持敬皎皎靈臺瑩月華肯容尺霧寸雲遮片言不善違千里一敬無欺勝百邪果向胸中存匕鬯任教天外走雷車盤盂見説剛難剝不曰人間有莫耶天體極髙明用極圓動時發育静時專乾乾不息惟行健昊昊無私只自然人道固宜通且正物情毋怪塞而偏古今誰解畫前易虧殺堯夫説後先地旁薄中天體勢斜四維蠻貊拱中華江淮河漢通山嶽城郭溝池固國家内直外方形有限動開静翕用無涯至哉坤道安貞吉一動才先五氣差人一㸃靈臺備五常九疇洪範盡三綱人皆可以為堯舜物不能齊任老莊粟麥未登同秕稗詩書有味勝膏梁吾儒必欲參天地終日乾乾要自强述教好名專利已為貪學佛求僊更可慙萬物固殊原有一兆民雖衆教無三法皆空相非真見道本無為是贅談覆載生成天地了聖人不作定誰參東坡為子過書金光明經卷後有感而作説有談空似可聽筆端浩浩㵼滄溟既能若彼崇三寳未審如何處六經就使如來超法界不應尼父困天刑區區教子心雖切絶異當年鯉過庭感興二首學海汪洋萃百川豈如潢潦竟無源蟠胸能了五千卷倚馬何難數萬言秕粟豈宜升俎豆虚車奚用飾輪轅反身無愧生平了一任嗷嗷衆口喧暮史朝經亦有年豈知飢飽與寒暄禮儀未究三千品精一空傳十六言大易始乾兼動静連山首艮總貞元隂陽慎勿輕先後體用由來是一原排空真要長存妄要無豈容真妄一齊除鬼神未必昧常理天地不能空太虚注意六經當自得蟠胷萬卷果何書窮髙極遠終忘返不信人間有廣居知止一編大學有餘師心定神全不妄思求止自宜從至善問公吾欲對無私穀當秀實登場後瓜到甘香落蔕時百尺竿頭誇進步不知學者欲何之人道人生不學欲如何璞玉猶能聽琢磨共笑劉琨乗夜舞獨憐墨子避朝歌忍將騏驥隨駑馬儘説鉛刀勝太阿往聖已嘗存大訓後來寧不賴餘波任分懶向山林滅性情厭從朝市覔功名千鈞勁弩容虚發九折危塗敢妄行富不可求從所好義然後取復何爭詩書滿架無窮樂造物於人亦未輕静坐皎皎氷壺月色寒豈容一物在其間了無俗事相縈擾中有真人自往還心定不妨居閙市坐馳安用住空山龍騰虎躍須臾了天宇寥寥萬象閑勉吏員讀書為矢為函亦偶然病根一入老難痊斡旋赤螘縱横陣把握青蠅黒白權鴆葛豈宜藏藥籠申韓元不到經筵寛平易簡唐虞治且許皋陶得正傳戒酒一介微軀幸粗安忍令狂藥恣戕殘伯倫至死無遺恨康節平生不盡歡舌上有刀招禍易胸中無鑑責人難老來慎勿逢朱粲糟彘徒能奉一飡嘉訓嘉訓嘉謀豈在多惟精惟一外無他射鼷未要操彊弩斬馬終當倚太阿賴有簡書開聖藴不須杯酒發天和茁然生意春長好助長揠苗將奈何彈指彈指聲中過百年窮通壽夭豈非天熊魚尚不能兼有齒角何由得兩全自笑莊生誇盜跖誰憐夫子哭顔淵額頭肉薄臀邊厚濁富清貧豈偶然否泰否泰相乗理自然羽蟲常得氣之先世衰尼父書鸜鵒嵗晚堯夫歎杜鵑賢聖立心無不盡乾坤生物未嘗偏欲窮藏往知來事須識庖犧未畫前閒吟蓬蓽深居絶市喧詩書滿架對晴軒商周革命三千國舜禹傳心十六言逐末者多誰務本泝流而上獨窮源若言莊叟尊尼父即是揚雄美屈原偶成二首智者深藏夜壑舟豈知鵲巧不如鳩唐虞至聖傳中道桀紂甘心處下流覺夢自争蕉葉鹿古今誰造棘端猴黄精鈎吻形相肖珍重良醫子細収挿架將收萬卷書尚憐衰朽腹空虚多才多藝我何有老圃老農吾不如莊叟自誇東海鼈任公儘釣淛河魚道明義正忘功利百世當尊董仲舒春前一日陽息隂消嵗又窮易窮則變變方通泰亨固合明升降艮止何由限始終河漢一時隨北斗闗山明日属東風春盤臘酒毋相尚麟閣雲臺各自功感事杜史陶經儘有條顛文倒字彊為妖畫蛇未竟徒安足救旱無功反揠苗玉振金聲周雅頌鳯儀獸舞舜簫韶許由有耳休嗔洗我亦臨風厭此瓢患失患失嘗為鐵户樞藏舟夜壑竟何如才從龍㫁征商了又向墦間乞祭餘白璧任他酬管籥黄金容我貴詩書朝榮暮悴恒相繼可惜無人鑒覆車萬類萬類參差豈易齊枉將人品限雲泥兩朝並相韓忠獻千載幾人金日磾此際既能重搏虎來年未必不攘雞内剛外險終成訟水自東行天自西自警多病形骸百不任掩書孤坐動微吟精誠許國能完璧中正同人果㫁金太甲三篇伊尹志出師兩表孔明心自甘與物俱衰朽何用尊前較古今時有不言不笑者人以為賢迺賦見説熊魚未易兼聖門取舍極精嚴盛稱陋巷顔淵徳深貶於陵仲子廉有得自當如虎變不才安用學龜潛勿言正欲防非禮豈使人人口盡箝為闢邪説賦洙泗淵源未易窺聖賢出處豈難知區區李覯非鄒孟録録王充毁仲尼上下七篇仁義府古今六籍帝王師堂堂吾道參天地撼樹蚍蜉亦可悲造物造物權衡界限嚴豈容巧力得抽添鶴長未要憂鳬短荼苦安知有蜜甜黄葉聲乾風透户碧梧隂重月窺簾人生莫謂非天命烏黒由來不日黔評詩二首九經能得幾何字千載不知多少詩上帝生才雖有異先王作樂本無私典墳已降聞商頌風雅兼亡到楚辭今日既非前日是昔人當作後人師好句真如得好官善觀海者必觀瀾批風切月將求異流水行雲本不難武庫大開森利器化機常轉得神丹乾坤若謂多清氣千載誰登子美壇艮齋詩集卷四
