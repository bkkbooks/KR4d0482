body:
  text: 艮齋詩集卷十二元侯克中撰書懐多病形骸混世塵一時元老樂相親論交敢結忘年友揣分甘為入幕賓蝴蝶可憐三月莫牡丹能得幾時春如今去住誰拘管好箇江湖自在身興來愁裏那堪聴子規興來還覺牡丹期闗心錦樹香仍好到手金罍醉莫辭捲地狂風花落後透簾殘月酒醒時堂堂春去誰能挽裊斷垂楊碧玊絲濁渭濁渭清涇未易論從他燕蝠自朝昏商君必欲更秦法宋玊徒勞弔楚魂萬斛精梁羣鼠厭一鈎香餌六鼇吞老來不解興亡事睡足斜陽栁外村莫春感懐香冷金荷畫燭殘人生常恨四并難消磨永夜須醽醁主張餘春有牡丹故國松楸千里夢破牕風雨五更寒天涯多少傷心事倚遍西樓十二闌逺逰好山招隠合歸休底事天涯賦逺㳺塵世幾人能百嵗客懐一日抵三秋風號老樹寒蟬切霜廹虚堂社燕愁顧我自無湖海氣也能髙枕卧曽樓城樓感事二首霜落錢塘木葉疎樹猶如此况頭顱乘桴政欲浮滄海擿埴那堪索畏塗周顗保全王太傅叔牙知殺管夷吾滿衣塵土無人問慷慨臨風酒一壺社燕秋鴻幾徃還病軀依舊住人間不填溝壑何多幸彊涉風波亦厚顔霜後謾誇黃鞠好沙頭未見白鷗閒錢唐六載誰知已城外西湖樓外山久客久客情懐觸處傷樂天老去不能忘風敲砌竹秋無際月轉庭槐夜未央幾縷腥涎蝸篆細一椷鄉信鴈聲長異鄉何幸多知已蘭秀蓀馨菊又芳和王國用宣慰述懐韵泛泛扁舟一葉輕五湖佳處弄新晴醉中杯杓秋雲滑夢裏池塘春草生昨日方榮今日悴前車纔覆後車行詩書自有無窮樂肯為人間寵辱驚湖海湖海元龍氣自豪古今公論豈能逃光風霽月時難得白雪陽春調更髙元亮未嘗聞杜宇伯倫終不信離騷是非利害都休問醉聴真珠滴小槽秋夜獨坐蕭然風露入秋堂頓覺虛牕枕簟凉烟盡片時金鴨冷月明終夜木犀香百年事業一壺酒萬卷詩書兩鬢霜用舍窮通均有命莫因得鹿笑亡羊感事劉伶常醉屈原醒酒頌離騷似反經小器易盈如斗盎大聲難掩過雷霆山銜落日千林暝水接長天一様青客至莫談當世事有書髙誦老夫聴秋晚少年湖海不知愁景入桑榆事事休富貴未嘗希晉楚功名定不到巢由西風籬落黃花晚明月闗河白鴈秋千載有誰如范蠡五湖容我泛扁舟秋夜懐友秋老東籬菊已殘故人猶未報平安飲餘浮螘愁仍在過盡飛鴻信轉難一寸青燈然永夜半牕零雨送初寒匣中長鋏塵生久肯為無魚􅂑次彈漏盡漏盡譙門鼔不撾冷霜殘月射牕紗嗸嗸鴻鴈長為客小小蝸牛尚有家千載廢興消竹葉百年勲業愧菱花江湖牢落成何事贏得星星兩鬢華清明後雨中有感盡日尋春興未闌落花庭戸雨珊珊香銷寶篆黃金冷風撼筠梢碧玊寒杜宇精魂愁夜永牡丹顔色惜春殘垂楊似苦東君去青眼盈盈淚不乾觀物物態人情儘擾攘靜中容我細稱量豺狼至惡猶知母蜂螘雖微亦有王桑吐緑雲蠶紙盡花飛紅雨燕泥香都將造化無窮趣收入奚奴古錦囊有感滿地蒼苔襯落英羅衣猶怯曉寒輕栁花白候風無定梅子黃時雨不晴萬事總違前日願一杯聊盡故人情陶然未接無何境卧聴江潮打岸聲浩歎幽谷芝蘭雜草萊塩車騏驥等駑駘汎觀離亂屠沽輩總是承平將相才楊栁儘教風外舞牡丹可惜雨中開春歸芳草連天逺日莫佳人望不來野興野人僻性自疎慵歸興年來似酒濃秋露曾沾山躑躅春風不管木芙蓉獄中劒氣招雷煥㸑下琴聲感蔡邕老去不愁林下友六經諸子舊相從秋懐四首客路黄塵染敝衣此心元與世相違每臨青鏡慚衰朽枉著黄金買是非爛漫雲山歸鳥盡蕭條霜樹故人稀西風不管天涯恨社燕秋鴻各自飛窮愁有脚日相隨心與時乖百不宜醉裏見山如故友病中得句勝良醫巢無𤣥鳥社方過菊有黄花秋未知千載淵明歸去後西風容我醉東籬萍蹤梗跡寄天涯幾見江南換物華短髪飄蕭嗟嵗月敝裘辛苦厭風沙錦城老栢千尋木玊井秋蓮十丈花材大古來無用處牡丹香徹五侯家結得生平故紙緣五車不博一囊錢愁便綠螘澆秋興病苦青蠅攪晝眠十載未諳南海俗幾時歸種北山田蒼生莫望深源起咄咄書空更可憐秋夜滿院蒼苔雨後深晚風如帚掃頑隂且傾濁酒澆岑寂莫把閒書較古今玩世我知陶令趣傷時誰識賈生心短檠殘燭虛牕月辛苦寒蛩徹夜唫感事彊哭雖悲自不哀真親未笑意先諧知幾那得人如鳥報本猶聞獸有豺千載湖山留畫舫九州塵土厭芒鞋好花似與東風約時送幽香到竹齋錢唐春日錢唐春日憶梁園地限江河氣自偏水外借樓聊度日天涯囬首又經年梅専南土生成早栁得東風造化先百嵗人生今過半更㸔桃李幾争妍春曉料峭東風送曉寒梅花消息已闌珊雨催新燕尋巢急雪阻歸鴻出塞難小草乘時生曲徑好山終日對危闌桃夭杏艶從渠閙留著芳尊待牡丹懶散懶散形骸百不宜此身長恨住山遲一庭花氣迷蝴蝶滿地月明聞子規少日有緣償酒債莫年無用坐書癡跖脩淵天縁何事問著天公未必知清明感事富家過節猶寒食旅舍平時亦禁烟暖老無功嗟栁絮買春不住笑榆錢鏡中白髪非前日樓外青山似舊年佳客盡情招不得滿牕花影枕書眠春莫夭桃繁杏擁樓臺淡抹濃粧次第開照眼彩雲凝緑樹轉頭紅雨㸃蒼苔鳥知薄莫投林去燕怯輕寒過社來百嵗人生能幾日一年春事又塵埃倚樓倚樓初不為行藏一㸃青山是故鄉愧爾菱花明似月照人蓬鬢白於霜百年人物空春夢千古闗河又夕陽莫道水深魚極樂不如魚水兩相忘嵗晚楚水吳山萬里賖天涯嵗晚動長嗟仲舒下筆成三䇿惠子藏書漫五車嘉榖每傷秋雨盛好山常惜莫雲遮世無博物張華出竟把鉛刀作莫邪秋曉銀箭無聲玊漏乾布衾如鐡紙牕寒富商不畏瞿塘險逐客空嗟蜀道難樓外青山招我隠天涯綠綺向誰彈髯霜鬢雪人生了勲業何須鏡裏㸔重陽雨中感懐天涯九日厭飄零况復淋淫愴客情萬里悲風催晚景兩簷寒溜瀉秋聲驅除磊塊非無術準擬登臨又不晴莫謂君臣難際會菊花千載一淵明春日途中二首父母駸駸兩鬢華倚閭終日望天涯太平簫鼔村村酒寒食亭臺處處花萬里歸來嗟塞鴈幾行飛去羨林鴉窮途多少思親淚莫遣東風吹到家滚滚黄塵滿敝衣旅人春晚思依依天涯岐路亡羊去枕上闗山化蝶歸桃業逺勝荼葉苦梨花不待栁花飛思親自謂還家好猶恐山妻不下機南塘夜飲雨後風來枕簟涼厭厭良夜對南塘一輪璧月桂花冷十里鏡湖雲錦香釣水采山盤谷樂幕天席地竹林狂滿斟濁酒閒唫嘯不放常人入醉鄉宿重陽觀蓬鬢刁騷一草冠竹齋瀟灑兩蒲團人間嵗月空催我壺裏烟霞不属官塵土定知今後少乾坤還比向來寛杖藜徐步斜陽外笑㸔蜣蜋衮糞丸青草湖阻風溪風洞俗不堪論楚些吳儂儘厭聞千里烟嵐青潑黛兩岐霜竹翠連雲故人自有金蘭約覊旅誰將玊石分猨鶴不須多悵怏歸來擬和北山文鼇山早發長夜漫漫不肯明戌樓更盡曉雞鳴櫝中有玊人心重囊裏無金馬背輕滿甕綠醅隨分酌數莖白髪借愁生自慚不是天涯物莫向征夫説姓名汴梁元日懐親時弟良卿為刑􅈠掾因寄之君在燕都我汴梁寥寥闗塞兩相望脊令有恨來南土諼草無功樹北堂白日簿書官事冗紅塵道路客心忙雙親老大情何苦誰為新正壽一觴艮齋詩集卷十二
