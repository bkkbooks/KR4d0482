body:
  text: 艮齋詩集卷五元侯克中撰史丞相拜開府貔虎軍中擁將壇鳯凰池上侍金鑾三分功業歸諸葛兩晉風流属謝安開府威儀今日見凌烟圖畫後來看從教桃李爭春色留著松筠傲嵗寒送河南崔宣慰赴軍前膽畧平兼將相權諫行言聴得君專寇恂只合留河内黄霸終當起潁川天際夕陽明遠樹馬頭春意動歸鞭此囘宣慰江淮了四海蒼生望息肩寄飛卿髙㕘政白璧輕投反見疑刻舟求劍一何癡垂垂素髪催人老耿耿丹心敢自欺千古是非無處問六經模楷有餘師巖巖節彼南山下應被髙明笑此詩病後汴梁寄湖南崔左丞蹤跡蹉跎愧轉蓬生涯寥落業屠龍飄飄爭羨雲間鵠鬱鬱誰憐澗底松兩地異鄉千里月五更殘夢一聲鐘天明細問衡陽鴈相去闗山又幾重賈綂軍席間燕趙春寒草未芽襄陽城下見桃花主人勤厚方投轄逰子飄零久憶家千里歸心隨過鴈四更清夢入悲笳溶溶二月澄江静好借春風送客槎止崔左丞入廣青雲人物氣横秋功業熏天正黒頭當路豺狼真可畏螫人蜂蠆不須憂喬松傲雪三冬好蔓草經霜一夕休此去相君當介意湖南得失在潭州留别崔左丞握手臨風話肺肝煦人春意不知寒處身似涉千㝷浪舉足如升百尺竿誰謂書生成事少自知花様入時難此來厚徳無他報時遣飛鴻一問安寄賈㕘政我居汴水子江東子向荆湖我淛中千里謾傳魚鴈信半生長恨馬牛風將來英物寧無種老去新詩愈有功四月揚州紅藥好擬拚一醉與君同寄飛卿髙㕘政自古人間行路難壽陵況復學邯鄲杏桃艶艶爭春色松柏森森傲嵗寒白髪等閒催我老朱絃疏越向誰彈何時把臂傾尊酒燈火西忩語夜闌送劉大使按察浙東時年七十分寵南來按浙東幾人矍鑠得如公狗偷䑕竊林梢露吏稱民安草上風少日未能酬壯志暮年正好立竒功七旬便欲投閒去笑殺磻溪把釣翁寄叔文崔中丞盜賊常憎月有光從知艮賈必深藏傳聞市虎猶堪畏察見淵魚恐不祥萬朶秋蓮空自老一枝寒菊為誰香朝來㸃檢閒風景鶴在深林鶖在梁許獻臣經歴拜監察御史暮史朝經樂未厭居官行已足撝謙二龍題品千年監四岳規模一行廉蓮幕風生方晝永柏臺霜落忽秋嚴豺狼滿路君須問細務何煩較米鹽寄王國用總管十月収君六月書呼兒讀罷重踟蹰老懐久已塵生研短髪新來雪滿梳四海幾人同鮑叔五湖千古一陶朱故園晚景桑榆樂浙水呉山恐不如雷苦齋致仕後以詩招之好在江南第一州山川民物足風流故人湖上方停櫂客子天涯正倚樓魯縞不穿彊弩末槀砧當賦大刀頭知君平日多清興莫為梅花苦滯留寄李敬甫總管忽聞君至自惟揚立馬㝷舟已去杭嗟我所行如是拙惜君常帶許多忙竹西歌吹三春好湖上風烟六月涼因便勿慳題數字故人誰最不相忘寄賈㕘政造物驅人豈自由肯容騎鶴上揚州心如梅子徒酸楚身似楊花任去留愧我無家長作客羨君有嗣已封侯佳辰不與瓊華宴髙詠新詩獨倚樓再招雷苦齋吾子平生苦愛人令人頃刻未忘君鷓鴣既已為忠告杜宇胡然不樂聞十載幾囘能聚首一尊何日重論文闌干倚遍殘陽下滿樹歸鴉呌暮雲送冀正父龎眉書客髩如絲邂逅吳門識紫芝規矩在心元不謬權衡到手了無疑全牛正要庖丁解良馬仍煩伯樂推松柏凜然霜雪操賞音何待嵗寒知寄王國用簽省剥啄聲中夜未央起來顛倒失衣裳衡門愧我栖遲久驛路憐君去住忙兩地異鄉容易感一燈情話最難忘扁舟指日西湖上共醉秋蓮十里香寄徐中丞子方二首學海汪洋萃衆流早年名姓冠鼇頭星輝北極三台曉霜落南臺萬象秋天上麒麟符治世人中騏驥眇齊州何時卷却經綸手同向滄浪把釣鈎五載分攜憶汴京慨然詩酒話平生蠧魚擬向書中老威鳯俄聞海上鳴物有短長從尺度事無輕重任權衡畏塗九折連雲險見説王尊掉臂行白敬甫經歴有閩中之行里巷親情未易疎豈期嵗晚别中吳天衢自昔摶鵬翼家道于今有鳯雛尊俎只宜終日戒詩書不可片時無洪勲大業他年了重繪香山九老圖予客姑蘇王御史持李鵬舉書至知檢討太常以詩答之故人北去寂無聞珍翰南來意甚勤貪慕癡蠅鑽故紙不知老鵠上層雲魚鹽江浙君憐我仕宦京師我念君歸計儻如前日約漢陽風月許平分他日劉牧之回持李鵬舉書并所和詩見寄復用前韻答之心聲灑灑快吾聞手畢諄諄愧爾勤過隙白駒催短景出門蒼狗變浮雲平生顧我多知己到處逢人只問君一様老懷難具述兩鄉明月解中分胡紹闓提刑浙西以疾求去良賈深藏實若虚埋輪清節勝登車九重夢寐思三老四海衣冠仰二疏走狗儘追東郭兔剖蝸難釣北溟魚知君此去無他志要讀山中滿架書寄徐中丞子方虚室寥寥紙帳深起來欹枕聴幽禽一杯謾記别時語千里空嗟病後吟裊裊爐烟羇旅恨蕭蕭髩影故人心春風何日梅花底細嚼幽香酒滿斟寄劉牧之霍清甫二廉訪邂逅三人若有期相親相愛豈相違夜深燈影聨鑣過春滿湖光帶酒歸老驥謾懐千里志大鵬獨傍九霄飛别來莫怪音書絶客舍蕭條鴈亦稀三月三日對緋桃寄呈雪谿紫山二按察春意闌珊雨意濃山隂脩竹怨東風莫辭芳酒盈尊綠忍負夭桃滿樹紅曲水引詩思束晳洛濱合宴憶裴公醉鄉深處無何有省與時人彊異同王宣慰有廢棋讀書之志喜而為之賦乾坤造化筆頭生絶勝閒窓辟剥聲夫子大成猶遠慮奕秋小數欲常贏六經自合終身樂一著何須拚死爭抛却異途由正道恰如離亂變升平徐廉訪寄西湖雜詩因答之江淮襟量雪霜姿曽折蟾宫第一枝北闕萬言金馬賦西湖千首錦囊詩大奸猖熾從常憲細務紛紜付有司暇日朋來還對酒此時不醉復何時贈義總綂内師尼父外如來不許庸人取次猜塵土掃清心地廣葛藤斫盡性天開萬松有子皆堪種五栁惟君獨肯栽竹破虚空無箇事月明依舊照靈臺寄雷學士彦正十年蹤跡寄江湖霜樹風枝半夜烏喪貝我非前日有盍簪君念故人無市金白晝從渠攫櫝玉清時待價沽百萬呼盧纔一擲此情當付牧猪奴寄劉簽事牧之郭運副邦彦二首樓上春寒暮靄深豈期佳客共相㝷蒲鞭示辱文饒徳寳劒衝天元振心知已二賢雙白璧克家一子萬黄金髙山流水非難和明月清風是賞音詩書滿架未為貧潤屋何如潤此身有命在天非在我為仁由已豈由人籃輿擬賦陶元亮錦幛徒誇石季倫漁父不知臺閣貴五湖佳處掌絲綸史右丞退居吳山讀書山瞰江湖市繞山相君髙處宴衣冠驚濤洶湧風雷壯怪石巉巗劒㦸寒今古炎涼閒裏覺聖賢出處静中看六經自有無窮樂絲竹何須凂謝安寄賈㕘政楚水吳山限大江不堪多病困南邦燭留夜色明空壁雨送秋聲入破忩磊落似君今有幾飄零如我古無雙暮年猶為兒孫計鴻鵠髙林愧老龎梁貢甫以天官再使交趾囘題卷後蘭省驅馳筆硯中已知不與衆人同累專名郡王陽政兩使遐方陸賈功晚境日親萱草緑曉忩時夢木蓮紅至今使者經行處猶問當時吏部公寄京口卜彦才府判家事匆匆官事繁詩書肯放片時閒當年嗟我髯方白今日憐君鬢已斑千里好風來鐵甕一江明月浸金山相看同是天涯客回首燕然似夢間艮齋詩集卷五
