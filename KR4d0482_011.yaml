body:
  text: 艮齋詩集卷十一元侯克中撰題劉同知憲明竹林歸隠圖深躍髙飛魚與鳶有餘不足䕫怜蚿山林廊廟聴所遇窮達富貴無非天燕山劉君英且賢知幾識變能方圓從軍少日尚意氣馳馬試劒三十年一日取史讀是非剖判如目前晚年力窮經信如食蜜無中邊民生性皆善為惡非本然或拘氣禀異或為外物遷茍能克盡已之慾天理亦復純而全聖人大道直如弦公能了了知其傳沉酣玩味亦已久得魚得兔忘蹄筌莊生齊物論老氏谷神篇靜中胸次清如水一讀徑造𤣥中𤣥黃塵嵗月催華顛便欲歸去棲林泉太行之陽竹林外有水可釣陸可佃雲林四時風景妍更須畫手煩龍眠筆端造化寫元氣未信淇川輸􅜁川我生不辰私自憐擬鬻琴書買釣船愛水愛山平日事此生此疾何時痊幾時歸夢迷風烟羡君去我如登仙臨風握手一杯酒與君共結蘇門縁西園月下唫西園寂寂花冥冥銀河影落寒無聲乾坤一雨開晚晴西風滿意新凉生此身不為塵䋄嬰恍如夢到芙蓉城花邊不見人吹笙但覺一天風露清吾有美酒同誰傾月華照破幽人情此樂自足娛生平豈以富貴為峥嶸今日布衣吾何輕明日錦衣吾何榮誰為白屋誰公卿髙門未必皆豪英老懐素不求功名悦親亦欲長安行出門道路多榛荆豺狼蹤迹何縱横興來吸酒如長鯨醉中不覺新詩成雄雞一聲天下明秋夜森森秋氣寒摩空秋光山色空濛中西風滿地槐隂濃莫凉石井凋疎桐飄飄髙興凌蒼穹月波冷浸姮娥宮草根啾唧鳴寒蛩雲間斷續聞秋鴻自傷踪跡何飄蓬紅塵鞍馬長西東世間奔走多兒童羣烏誰與分雌雄山頭有苗髙且崇下䕃澗底百尺松良才偶處荆棘叢嵗寒豈與髙莱同我知富貴皆王公誰云草澤無英雄不堪衰朽臨青銅學書學劒今何功安得猛士持神鋒奮然跨海誅長虹擬傾銀漢澆塵胸瓦鉢不貴黃金鍾無何鄉裏誰相從髙情賴有無名公天根月窟人中龍肯來為我開朦朧相逢􅂸却衰顔紅黃花籬落生春風和薄薄酒薄薄酒可自娛麤麤布儘自如薄酒麤衣樂有餘狂興飲乾畢卓甕醉魂猶繞黃公壚醒來許再飲醉倒不須扶汨羅江上獨醒客何似髙陽一酒徒詩思逸酒腸寛可嗟人世多悲歡莫種子孫祸空令肝膽酸不聴是非徒勞洗耳不招塵土何必彈冠閒身凖擬菟裘老不受人間富貴瞞問蒼天何匆匆造物戲我如児童浮雲富貴猶敝屣但求夢裏無相逢衣雖麤一重不煖添一重酒雖薄一鍾不醉復一鍾莫言薄酒難成醉但願清尊常不空金烏催玊兔春燕隨秋鴻儘他短髪星星白放我衰顔日日紅我嗟人寵辱人笑我疎慵棄財如土羡龐公積金買禍悲石崇榮辱事古今同老鶴固當巢雲松丹鳯只合棲梧桐萬事不湏多計較醉鄉深處無西東黃塵十丈埋英雄空聞漢殿并秦宫斷碑仆碣衰草沒壊階頺址愁烟蒙感慨落誰詩筆底興亡付我酒杯中一聲長嘯潛蛟龍九霄豪氣盤長虹浩歌歸去誰相從止有碧山明月野塘風燕山行燕山八月秋風髙蕭蕭颯颯吹麻袍風雲入夢喚不去自知伎倆如鉛刀人生若春草世事皆秋毫倏春忽秋變寒暑欲粘日月奈何不解煎神膠賢愚貴賤共一世老死不識誰英豪魚龍混人海蘭蕙雜蓬蒿江山浩蕩不知幾千里一身奔走何劬勞我欲住西山西山當路猛虎長咆哮我欲隠東海東海蛟螭日夜翻風濤隠水住山俱不可何如養拙作鳩巢我籬以翠竹結屋以白茅閒花野菜滿前後矮槐髙栁羅周遭麤衣糲食有餘樂客至竈冷無烹炮興來花底餔醨糟醒來牕下讀離騷憑誰說與三閭老莫謂劉伶非爾曺從兹可結忘年交秋宵步月澄澄金氣浮天河月華桂影髙婆娑嚴霜到水凋池荷西風落葉虚庭柯百年無奈四時速一事不成雙髩皤長繩不繫西飛日浮世空隨東逝波英雄盡向黃塵老古今不覺青山磨張良重死輕相印范蠡全身老漁蓑李斯讒喙遭顯戮楚客獨醒投汨羅千古是非無處問丈夫畢竟當如何我有藜杖芒鞋敝緼袍王孫繡鞍驕馬鳴玊珂我獨彈鋏悲來歌王孫蹄去醉顔酡我非孤癖絶交㳺蒼松元不招陽和衡門盡日無人過舉杯月裏邀姮娥未必姮娥不世情畫樓髙處清光多艮齋詩集卷十一
