body:
  text: 艮齊詩集别集類四元提要臣等謹案艮齊詩集十四卷元侯克中撰克中字正卿真定人幼喪明聆羣兒誦書不終日能悉記其所授稍長習詞章自謂不學可造詣既而悔之以為刋華食實莫首于理原易以求乃為得之于是精意讀易著書名大易通義年至九十餘而卒今通義已不傳而袁桷所作序尚見清容居士集中可略見克中本末此乃所作詩集猶元時舊刻卷首有毛晉私印蓋汲古閣所藏中間律體最多而七言律為尤夥卷一卷二皆咏經史之作卷八為諧音格乃每首全以音通字異者相叶如一東叶同峒桐銅童二冬叶鏞庸容墉蓉之類凡七言三十一首五言二十一首亦克中自創之格為古所未有其詩頗近擊壤一派多涉理路而抒情賦景之作亦時有足資諷咏者昔唐汝詢幼而失明長而能詩姑蔑一集明人詫為古所未有而不知克中已在前是亦足為是集稀傳之證又汝詢能注唐詩解而克中乃至能詁經是所學又在汝詢上矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀
  hash: sha256:32546d4a423c3a428601293687f6ead142cc3a26ef56d8b2bee00672acc5637e
